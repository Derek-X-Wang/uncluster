openapi: 3.1.0
info:
  title: Uncluster Control Plane API
  version: 0.2.0
  description: |
    Wire protocol between the `uncluster` CLI, agents, and the control plane.
    This file is the source of truth for the wire shape. See
    docs/architecture.md for current-state design and docs/adr/ for
    decision rationale. V1 task-execution endpoints were removed in S11 (ADR-0002).
    The V2 surface centers on SSH cert signing, ACL CRUD, agent enrollment,
    and the typed heartbeat envelope.
servers:
  - url: https://uncluster.example.com:7777
    description: Example production URL (operator-provided)

paths:
  /healthz:
    get:
      summary: Liveness probe
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  version: { type: string }

  /v1/tokens:
    post:
      summary: Create a token (join or caller)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateTokenRequest" }
      responses:
        "200":
          description: Token created (plaintext returned exactly once)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CreateTokenResponse" }
    get:
      summary: List tokens (metadata only; never plaintext)
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/TokenSummary" }

  /v1/tokens/{id}:
    delete:
      summary: Revoke a token
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204": { description: Revoked }
        "404": { description: Not found }

  /v1/agent/register:
    post:
      summary: Exchange a one-time join token for a long-lived agent token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AgentRegisterRequest" }
      responses:
        "200":
          description: Registered
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AgentRegisterResponse" }
        "401": { description: invalid/used/expired join token }
        "409": { description: agent name already in use }

  /v1/agent/heartbeat:
    post:
      summary: Report agent liveness, endpoints, and policy state; receive policy updates
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/V2HeartbeatRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/V2HeartbeatResponse" }
        "410":
          description: Agent has been revoked; wipe principals
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RevokedResponse" }

  /v1/agents:
    get:
      summary: List registered V2 agents (excludes revoked)
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AgentDetail" }

  /v1/agents/{id}:
    get:
      summary: Get a V2 agent by id or name
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AgentDetail" }
        "404": { description: not found }
    delete:
      summary: Revoke and deprovision a V2 agent
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204": { description: agent revoked }
        "404": { description: not found }
    patch:
      summary: Update agent settings (e.g. fail_closed_after)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fail_closed_after:
                  type: integer
                  nullable: true
                  description: Seconds after last heartbeat before principals are wiped; null to clear
      responses:
        "204": { description: updated }
        "404": { description: not found }

  /v1/certs:
    post:
      summary: Issue an SSH user certificate for a Caller→Agent access grant
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CertRequest" }
      responses:
        "200":
          description: Signed certificate
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CertResponse" }
        "400": { description: bad input (pubkey is cert, TTL too long, etc.) }
        "401": { description: unauthorized }
        "403": { description: acl_miss — no ACL grant for (caller, agent, username) }
        "404": { description: agent not found }
        "503": { description: CA not configured }

  /v1/acl:
    post:
      summary: Grant a caller access to an agent for a given SSH username
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateACLRequest" }
      responses:
        "201":
          description: ACL entry created (or returned if already exists)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ACLEntrySummary" }
        "400": { description: missing required fields }
        "401": { description: unauthorized }
        "404": { description: caller or agent not found }
    get:
      summary: List ACL entries, optionally filtered by caller or agent
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: query, name: caller, schema: { type: string }, description: "Caller token id filter" }
        - { in: query, name: agent, schema: { type: string }, description: "Agent id filter" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ACLEntrySummary" }

  /v1/acl/{id}:
    delete:
      summary: Revoke an ACL entry by id
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204": { description: deleted }
        "404": { description: not found }

  /v1/agent/update-plan:
    get:
      summary: Fetch the current update plan (agent auth)
      description: |
        Returns the operator-set expected version and asset URL templates.
        An empty expected_version means no update is mandated.
        Agents call this after receiving a check_update command in a heartbeat response.
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UpdatePlanResponse" }

  /v1/server/update:
    post:
      summary: Set the expected agent version (operator auth)
      description: |
        Upserts the update policy. On the next heartbeat any agent whose
        agent_version differs from expected_version will receive a check_update command.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SetUpdatePolicyRequest" }
      responses:
        "204": { description: update policy set }
        "400": { description: missing expected_version }
        "401": { description: unauthorized }

  /v1/audit/certs:
    get:
      summary: List cert issuance audit events
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: caller
          schema: { type: string }
          description: Filter by caller token ID
        - in: query
          name: agent
          schema: { type: string }
          description: Filter by target agent ID
        - in: query
          name: user
          schema: { type: string }
          description: Filter by SSH username
        - in: query
          name: outcome
          schema: { type: string, enum: [signed, denied] }
        - in: query
          name: since
          schema: { type: integer, format: int64 }
          description: Unix timestamp; return events with ts >= since
        - in: query
          name: limit
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CertEventSummary" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: uct_<kind>_<id>_<secret>

  schemas:
    CreateTokenRequest:
      type: object
      required: [kind]
      properties:
        kind: { type: string, enum: [join, caller] }
        label: { type: string }
        expires_at:
          type: integer
          format: int64
          description: Unix seconds; omitted for caller tokens means "no expiry"; omitted for join tokens defaults to now+15m.
    CreateTokenResponse:
      type: object
      required: [id, token]
      properties:
        id: { type: string }
        token: { type: string }
    TokenSummary:
      type: object
      properties:
        id: { type: string }
        kind: { type: string }
        label: { type: string }
        created_at: { type: integer, format: int64 }
        expires_at: { type: integer, format: int64, nullable: true }
        used_at: { type: integer, format: int64, nullable: true }
        revoked_at: { type: integer, format: int64, nullable: true }
    AgentRegisterRequest:
      type: object
      required: [join_token, name]
      properties:
        join_token: { type: string }
        name: { type: string }
        metadata: { type: object, additionalProperties: true }
    ExpectedPaths:
      type: object
      required: [ca_pubkey, sshd_drop_in, principals_dir]
      properties:
        ca_pubkey: { type: string, description: "Absolute path for the CA public key file" }
        sshd_drop_in: { type: string, description: "Absolute path for the sshd config drop-in" }
        principals_dir: { type: string, description: "Absolute path for the AuthorizedPrincipalsFile directory" }
    AgentRegisterResponse:
      type: object
      required: [agent_id, agent_token, ca_pubkey, expected_paths]
      properties:
        agent_id: { type: string }
        agent_token: { type: string, description: "Plaintext agent token; shown exactly once" }
        ca_pubkey: { type: string, description: "authorized_keys-format CA public key line" }
        server_https_pin:
          type: string
          nullable: true
          description: "sha256:<hex> of TLS cert; empty when not pinned"
        expected_paths:
          $ref: "#/components/schemas/ExpectedPaths"
    V2HeartbeatRequest:
      type: object
      required: [agent_id, agent_version, observed_at]
      properties:
        agent_id: { type: string }
        agent_version: { type: string }
        observed_at: { type: integer, format: int64, description: "Agent wall-clock unix seconds" }
        endpoints:
          type: array
          items: { $ref: "#/components/schemas/AgentEndpoint" }
        policy_state: { $ref: "#/components/schemas/AgentPolicyState" }
        health:
          type: array
          items: { $ref: "#/components/schemas/AgentHealthCheck" }
        metrics: { type: object, additionalProperties: true }
    AgentEndpoint:
      type: object
      properties:
        subnet: { type: string }
        address: { type: string }
    AgentPolicyState:
      type: object
      properties:
        desired_version: { type: integer, format: int64, nullable: true }
        applied_version: { type: integer, format: int64 }
        applied_hash: { type: string }
        last_apply_status: { type: string, enum: [ok, failed] }
        last_apply_error: { type: string, nullable: true }
        last_apply_at: { type: integer, format: int64 }
    AgentHealthCheck:
      type: object
      properties:
        component: { type: string }
        check: { type: string }
        state: { type: string, enum: [ok, warn, fail, unknown] }
        error_code: { type: string, nullable: true }
        message: { type: string, nullable: true }
    V2HeartbeatResponse:
      type: object
      properties:
        ack_ts: { type: integer, format: int64 }
        server_time: { type: integer, format: int64 }
        policy: { $ref: "#/components/schemas/PolicyPayload", nullable: true }
        commands: { type: array, items: {} }
        fail_closed_after: { type: integer, format: int64, nullable: true, description: "Seconds; null = no fail-closed" }
    PolicyPayload:
      type: object
      properties:
        version: { type: integer, format: int64 }
        hash: { type: string }
        principals:
          type: array
          items: { $ref: "#/components/schemas/PolicyPrincipal" }
    PolicyPrincipal:
      type: object
      properties:
        username: { type: string }
        caller_token_ids:
          type: array
          items: { type: string }
    RevokedResponse:
      type: object
      properties:
        reason: { type: string, enum: [node_revoked], description: "Reason for 410 Gone response" }
    AgentEndpointSummary:
      type: object
      properties:
        subnet: { type: string }
        address: { type: string }
    AgentDetail:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        status: { type: string, enum: [online, offline, revoked] }
        agent_version: { type: string }
        created_at: { type: integer, format: int64 }
        last_seen_at: { type: integer, format: int64, nullable: true }
        fail_closed_after: { type: integer, format: int64, nullable: true, description: "Seconds after last heartbeat before principals are wiped; null = disabled" }
        endpoints:
          type: array
          items: { $ref: "#/components/schemas/AgentEndpointSummary" }
    CertRequest:
      type: object
      required: [agent, username, pubkey]
      properties:
        agent: { type: string, description: "Agent id or name" }
        username: { type: string, description: "SSH username" }
        pubkey: { type: string, description: "authorized_keys-format user public key" }
        ttl_seconds: { type: integer, description: "0=default(300); max 900" }
    CertResponse:
      type: object
      properties:
        certificate: { type: string, description: "authorized_keys-format signed certificate" }
        key_id: { type: string }
        principal: { type: string }
        serial: { type: integer, format: int64 }
        valid_after: { type: integer, format: int64 }
        valid_before: { type: integer, format: int64 }
    CertEventSummary:
      type: object
      properties:
        request_id: { type: string }
        ts: { type: integer, format: int64 }
        caller_token_id: { type: string }
        target_agent_id: { type: string }
        username: { type: string }
        cert_principal: { type: string }
        pubkey_fp: { type: string }
        ttl_seconds: { type: integer }
        serial: { type: integer, format: int64 }
        key_id: { type: string }
        outcome: { type: string, enum: [signed, denied] }
        denial_reason: { type: string }
    UpdatePlanResponse:
      type: object
      properties:
        expected_version: { type: string, description: "Empty = no update mandated" }
        asset_url_template: { type: string, description: "URL template; {os}, {arch}, {version} substituted" }
        sha256_url_template: { type: string, description: "URL template for SHA256 checksum file" }
        force: { type: boolean, description: "Force update even if agent is already on expected_version" }
    SetUpdatePolicyRequest:
      type: object
      required: [expected_version]
      properties:
        expected_version: { type: string }
        asset_url_template: { type: string }
        sha256_url_template: { type: string }
        force: { type: boolean }
    CheckUpdateCommand:
      type: object
      required: [type, version]
      properties:
        type: { type: string, enum: [check_update] }
        version: { type: string, description: "The expected version string" }
    CreateACLRequest:
      type: object
      required: [caller, agent, username]
      properties:
        caller: { type: string, description: "Caller token id" }
        agent: { type: string, description: "Agent id or name" }
        username: { type: string, description: "SSH username" }
    ACLEntrySummary:
      type: object
      properties:
        id: { type: string }
        caller_token_id: { type: string }
        agent_id: { type: string }
        username: { type: string }
        created_at: { type: integer, format: int64 }
        created_by: { type: string, nullable: true }

security:
  - bearerAuth: []

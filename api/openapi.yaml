openapi: 3.1.0
info:
  title: Uncluster Control Plane API
  version: 0.1.0
  description: |
    Wire protocol between the `uncluster` CLI, agents, and the control plane.
    This file is the source of truth for the wire shape. See
    docs/architecture.md for current-state design and docs/adr/ for
    decision rationale. Note: V1 task-execution endpoints (tasks, chunks,
    SSE) are being removed per ADR-0002; the V2 surface centers on cert
    signing, ACL CRUD, agent enrollment, and the typed heartbeat envelope.
servers:
  - url: https://uncluster.example.com:7777
    description: Example production URL (operator-provided)

paths:
  /healthz:
    get:
      summary: Liveness probe
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  version: { type: string }

  /v1/tokens:
    post:
      summary: Create a token (join or cli)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateTokenRequest" }
      responses:
        "200":
          description: Token created (plaintext returned exactly once)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CreateTokenResponse" }
    get:
      summary: List tokens (metadata only; never plaintext)
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/TokenSummary" }

  /v1/tokens/{id}:
    delete:
      summary: Revoke a token
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204": { description: Revoked }
        "404": { description: Not found }

  /v1/agent/register:
    post:
      summary: Exchange a one-time join token for a long-lived agent token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AgentRegisterRequest" }
      responses:
        "200":
          description: Registered
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AgentRegisterResponse" }
        "401": { description: invalid/used/expired join token }
        "409": { description: node name already in use }

  /v1/agent/heartbeat:
    post:
      summary: Report node liveness and metadata; receive cancel instructions
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/HeartbeatRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HeartbeatResponse" }

  /v1/nodes:
    get:
      summary: List registered nodes
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/NodeSummary" }

  /v1/nodes/{id}:
    get:
      summary: Get a single node by id or name
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NodeSummary" }
        "404": { description: not found }
    delete:
      summary: Revoke (remove) a node; frees its name for reuse
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204": { description: revoked }
        "404": { description: not found }

  /v1/agents:
    get:
      summary: List registered V2 agents
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AgentDetail" }

  /v1/agents/{id}:
    get:
      summary: Get a V2 agent by id or name
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AgentDetail" }
        "404": { description: not found }
    delete:
      summary: Revoke and deprovision a V2 agent
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204": { description: agent revoked }
        "404": { description: not found }
    patch:
      summary: Update agent settings (e.g. fail_closed_after)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fail_closed_after:
                  type: integer
                  nullable: true
                  description: Seconds after last heartbeat before principals are wiped; null to clear
      responses:
        "204": { description: updated }
        "404": { description: not found }

  /v1/certs:
    post:
      summary: Issue an SSH user certificate for a Caller→Agent access grant
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CertRequest" }
      responses:
        "200":
          description: Signed certificate
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CertResponse" }
        "400": { description: bad input (pubkey is cert, TTL too long, etc.) }
        "401": { description: unauthorized }
        "403": { description: acl_miss — no ACL grant for (caller, agent, username) }
        "404": { description: agent not found }
        "503": { description: CA not configured }

  /v1/acl:
    post:
      summary: Grant a caller access to an agent for a given SSH username
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateACLRequest" }
      responses:
        "201":
          description: ACL entry created (or returned if already exists)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ACLEntrySummary" }
        "400": { description: missing required fields }
        "401": { description: unauthorized }
        "404": { description: caller or agent not found }
    get:
      summary: List ACL entries, optionally filtered by caller or agent
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: query, name: caller, schema: { type: string }, description: "Caller token id filter" }
        - { in: query, name: agent, schema: { type: string }, description: "Agent id filter" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ACLEntrySummary" }

  /v1/acl/{id}:
    delete:
      summary: Revoke an ACL entry by id
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204": { description: deleted }
        "404": { description: not found }

  /v1/audit/certs:
    get:
      summary: List cert issuance audit events
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: caller
          schema: { type: string }
          description: Filter by caller token ID
        - in: query
          name: agent
          schema: { type: string }
          description: Filter by target agent ID
        - in: query
          name: user
          schema: { type: string }
          description: Filter by SSH username
        - in: query
          name: outcome
          schema: { type: string, enum: [signed, denied] }
        - in: query
          name: since
          schema: { type: integer, format: int64 }
          description: Unix timestamp; return events with ts >= since
        - in: query
          name: limit
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CertEventSummary" }

  /v1/tasks:
    post:
      summary: Create a task for a node
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateTaskRequest" }
      responses:
        "201":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CreateTaskResponse" }
    get:
      summary: List recent tasks
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: query, name: node, schema: { type: string } }
        - { in: query, name: status, schema: { type: string } }
        - { in: query, name: limit, schema: { type: integer } }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/TaskDetail" }

  /v1/tasks/{id}:
    get:
      summary: Get task details
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TaskDetail" }
        "404": { description: not found }

  /v1/tasks/{id}/chunks:
    get:
      summary: List stored output chunks for a task
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
        - in: query
          name: stream
          schema: { type: string, enum: [stdout, stderr] }
          description: Filter to a specific stream; omit for all streams
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ChunksResponse" }
        "404": { description: task not found }

  /v1/tasks/{id}/stream:
    get:
      summary: Stream task output as Server-Sent Events
      description: |
        Replays all stored stdout/stderr chunks, then streams live chunks as
        they arrive.  Sends a final `done` event when the task reaches a
        terminal state, then closes the stream.

        Event types:
        - `chunk`: a ChunkOut payload (stream, seq, data, created_at)
        - `done`: `{exit_code, status}` — signals task completion
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        "200":
          description: SSE stream of task events
          content:
            text/event-stream:
              schema:
                type: string
                description: |
                  Newline-delimited SSE frames.  Each frame is one of:
                    event: chunk\ndata: <ChunkOut JSON>\n\n
                    event: done\ndata: {"exit_code":<int>,"status":"<string>"}\n\n
        "404": { description: task not found }
        "500": { description: server does not support streaming }

  /v1/tasks/{id}/cancel:
    post:
      summary: Cancel a pending or running task
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        "202": { description: cancellation requested }
        "404": { description: not found }
        "409": { description: not cancellable in current state }

  /v1/agent/next-task:
    get:
      summary: Long-poll for the next task assigned to this agent (30s)
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NextTaskResponse" }
        "204": { description: no task within timeout }

  /v1/agent/tasks/{id}/chunks:
    post:
      summary: Upload a chunk of task output (stdout or stderr)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
          description: Task ID
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ChunkUploadRequest" }
      responses:
        "200":
          description: Chunk accepted; returns truncation flag and any pending cancels
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ChunkUploadResponse" }
        "403": { description: Task not assigned to this node }
        "404": { description: Task not found }

  /v1/agent/tasks/{id}/complete:
    post:
      summary: Mark a task as complete with its exit code
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
          description: Task ID
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CompleteRequest" }
      responses:
        "204": { description: Task marked complete }
        "403": { description: Task not assigned to this node }
        "404": { description: Task not found }
        "409": { description: Task already completed }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: uct_<kind>_<id>_<secret>

  schemas:
    CreateTokenRequest:
      type: object
      required: [kind]
      properties:
        kind: { type: string, enum: [join, cli] }
        label: { type: string }
        expires_at:
          type: integer
          format: int64
          description: Unix seconds; omitted for CLI tokens means "no expiry"; omitted for join tokens defaults to now+15m.
    CreateTokenResponse:
      type: object
      required: [id, token]
      properties:
        id: { type: string }
        token: { type: string }
    TokenSummary:
      type: object
      properties:
        id: { type: string }
        kind: { type: string }
        label: { type: string }
        node_id: { type: string, nullable: true }
        created_at: { type: integer, format: int64 }
        expires_at: { type: integer, format: int64, nullable: true }
        used_at: { type: integer, format: int64, nullable: true }
        revoked_at: { type: integer, format: int64, nullable: true }
    AgentRegisterRequest:
      type: object
      required: [join_token, name]
      properties:
        join_token: { type: string }
        name: { type: string }
        metadata: { type: object, additionalProperties: true }
    ExpectedPaths:
      type: object
      required: [ca_pubkey, sshd_drop_in, principals_dir]
      properties:
        ca_pubkey: { type: string, description: "Absolute path for the CA public key file" }
        sshd_drop_in: { type: string, description: "Absolute path for the sshd config drop-in" }
        principals_dir: { type: string, description: "Absolute path for the AuthorizedPrincipalsFile directory" }
    AgentRegisterResponse:
      type: object
      required: [agent_id, agent_token, ca_pubkey, expected_paths]
      properties:
        agent_id: { type: string }
        agent_token: { type: string, description: "Plaintext agent token; shown exactly once" }
        ca_pubkey: { type: string, description: "authorized_keys-format CA public key line" }
        server_https_pin:
          type: string
          nullable: true
          description: "sha256:<hex> of TLS cert; empty when not pinned"
        expected_paths:
          $ref: "#/components/schemas/ExpectedPaths"
    HeartbeatRequest:
      type: object
      properties:
        metadata: { type: object, additionalProperties: true }
    HeartbeatResponse:
      type: object
      properties:
        cancel_task_ids:
          type: array
          items: { type: string }
    NodeSummary:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        status: { type: string, enum: [online, offline, revoked] }
        created_at: { type: integer, format: int64 }
        last_seen_at: { type: integer, format: int64, nullable: true }
        metadata: { type: object, additionalProperties: true }
    CreateTaskRequest:
      type: object
      required: [node, command]
      properties:
        node: { type: string, description: "node id or name" }
        command: { type: string }
    CreateTaskResponse:
      type: object
      properties: { task_id: { type: string } }
    NextTaskResponse:
      type: object
      properties:
        task_id: { type: string }
        command: { type: string }
    TaskDetail:
      type: object
      properties:
        id: { type: string }
        node_id: { type: string }
        command: { type: string }
        status: { type: string }
        exit_code: { type: integer, nullable: true }
        created_at: { type: integer, format: int64 }
        started_at: { type: integer, format: int64, nullable: true }
        finished_at: { type: integer, format: int64, nullable: true }
        output_bytes: { type: integer, format: int64 }
        output_truncated: { type: boolean }
    ChunkUploadRequest:
      type: object
      required: [stream, data]
      properties:
        stream:
          type: string
          enum: [stdout, stderr]
          description: Output stream identifier
        data:
          type: string
          format: byte
          description: Base64-encoded chunk bytes
    ChunkUploadResponse:
      type: object
      properties:
        truncated:
          type: boolean
          description: True if the per-task output cap has been reached; agent should stop sending
        cancel_task_ids:
          type: array
          items: { type: string }
          description: Task IDs pending cancellation on this node (piggyback delivery)
    ChunkOut:
      type: object
      properties:
        stream: { type: string, enum: [stdout, stderr] }
        seq: { type: integer, format: int64 }
        data: { type: string, format: byte, description: Base64-encoded chunk bytes }
        created_at: { type: integer, format: int64 }
    ChunksResponse:
      type: object
      required: [chunks]
      properties:
        chunks:
          type: array
          items: { $ref: "#/components/schemas/ChunkOut" }
    CompleteRequest:
      type: object
      required: [exit_code]
      properties:
        exit_code:
          type: integer
          description: Process exit code (0 = success)
    AgentEndpointSummary:
      type: object
      properties:
        subnet: { type: string }
        address: { type: string }
    AgentDetail:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        status: { type: string, enum: [online, offline, revoked] }
        agent_version: { type: string }
        created_at: { type: integer, format: int64 }
        last_seen_at: { type: integer, format: int64, nullable: true }
        fail_closed_after: { type: integer, format: int64, nullable: true, description: "Seconds after last heartbeat before principals are wiped; null = disabled" }
        endpoints:
          type: array
          items: { $ref: "#/components/schemas/AgentEndpointSummary" }
    RevokedResponse:
      type: object
      properties:
        reason: { type: string, enum: [node_revoked], description: "Reason for 410 Gone response" }
    CertRequest:
      type: object
      required: [agent, username, pubkey]
      properties:
        agent: { type: string, description: "Agent id or name" }
        username: { type: string, description: "SSH username" }
        pubkey: { type: string, description: "authorized_keys-format user public key" }
        ttl_seconds: { type: integer, description: "0=default(300); max 900" }
    CertResponse:
      type: object
      properties:
        certificate: { type: string, description: "authorized_keys-format signed certificate" }
        key_id: { type: string }
        principal: { type: string }
        serial: { type: integer, format: int64 }
        valid_after: { type: integer, format: int64 }
        valid_before: { type: integer, format: int64 }
    CertEventSummary:
      type: object
      properties:
        request_id: { type: string }
        ts: { type: integer, format: int64 }
        caller_token_id: { type: string }
        target_agent_id: { type: string }
        username: { type: string }
        cert_principal: { type: string }
        pubkey_fp: { type: string }
        ttl_seconds: { type: integer }
        serial: { type: integer, format: int64 }
        key_id: { type: string }
        outcome: { type: string, enum: [signed, denied] }
        denial_reason: { type: string }
    CreateACLRequest:
      type: object
      required: [caller, agent, username]
      properties:
        caller: { type: string, description: "Caller token id" }
        agent: { type: string, description: "Agent id or name" }
        username: { type: string, description: "SSH username" }
    ACLEntrySummary:
      type: object
      properties:
        id: { type: string }
        caller_token_id: { type: string }
        agent_id: { type: string }
        username: { type: string }
        created_at: { type: integer, format: int64 }
        created_by: { type: string, nullable: true }

security:
  - bearerAuth: []

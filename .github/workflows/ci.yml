name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        include:
          - { os: ubuntu-latest,  race: "-race" }
          - { os: windows-latest, race: ""       }
          - { os: macos-latest,   race: "-race" }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test ./... ${{ matrix.race }} -count=1

  # T1a Compose smoke per ADR-0008. Failure-taxonomy:
  #   * [REQUIRED] markers in test output → red gate (product failure)
  #   * [ADVISORY] markers (rendezvous/bootstrap) → warning only, quarantine
  #     rule escalates after 3 consecutive on main.
  # Uses `continue-on-error: true` on the test step + an explicit classifier
  # step so the gate decision is computed deliberately rather than from raw
  # exit code (the classifier is the AI-agent guardrail per ADR-0008).
  e2e-compose-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: docker info
        run: docker version && docker compose version
      - name: verify artifact collector script (mocked docker)
        run: bash test/e2e/scripts/test-collect-artifacts.sh
      - name: verify failure-taxonomy classifier (intentional-fail tests)
        run: bash scripts/ci/test-classify-step.sh
      - name: run T1a smoke
        id: smoke
        continue-on-error: true
        run: |
          set -o pipefail
          go test -tags e2e ./test/e2e/ -v -count=1 -timeout 10m 2>&1 \
              | tee /tmp/e2e-smoke.log
      - name: classify failure
        id: classify
        if: always()
        run: |
          set -euo pipefail
          log=/tmp/e2e-smoke.log
          if [[ ! -f "$log" ]]; then
              echo "no log produced — treating as required"
              echo "class=required" >> "$GITHUB_OUTPUT"
              exit 0
          fi
          if grep -q '\[REQUIRED\]' "$log"; then
              echo "found [REQUIRED] marker — product-class failure"
              echo "class=required" >> "$GITHUB_OUTPUT"
          elif grep -q '\[ADVISORY\]' "$log"; then
              echo "found [ADVISORY] marker only — bootstrap/rendezvous-class failure"
              echo "class=advisory" >> "$GITHUB_OUTPUT"
          elif [[ "${{ steps.smoke.outcome }}" == "success" ]]; then
              echo "no failure markers and smoke succeeded — clean"
              echo "class=success" >> "$GITHUB_OUTPUT"
          else
              echo "no markers but test failed — defaulting to required"
              echo "class=required" >> "$GITHUB_OUTPUT"
          fi
      - name: upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-compose-${{ github.run_id }}
          path: |
            test/e2e/_artifacts/
            /tmp/e2e-smoke.log
          if-no-files-found: warn
          retention-days: 14
      - name: enforce taxonomy
        if: always()
        run: |
          class="${{ steps.classify.outputs.class }}"
          echo "classification: ${class}"
          case "${class}" in
              success)  exit 0 ;;
              advisory) echo "::warning::e2e-compose advisory failure (rendezvous/bootstrap); see uploaded artifacts. Quarantine rule will escalate after 3 consecutive."; exit 0 ;;
              required) echo "::error::e2e-compose REQUIRED failure (product). Block merge."; exit 1 ;;
              *)        echo "::error::e2e-compose classifier produced unknown class=${class}"; exit 1 ;;
          esac

  # T2-linux loopback install smoke per ADR-0008.
  # Exercises the REAL `uncluster agent install` flow on a clean
  # ubuntu-latest runner: bootstraps a local Control plane on loopback,
  # joins+installs an Agent on the same host, asserts systemd unit + sshd
  # drop-in + principals dir + doctor pass, then deprovisions cleanly.
  #
  # This is the per-PR catch for systemd-unit-name-style install drift
  # (e.g. the `113b747` hotfix that escaped because no smoke tested the
  # actual install path). Steps follow the bootstrap/rendezvous/product
  # taxonomy from ADR-0008 — failures here are required (product class).
  t2-linux-install-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: bootstrap:build-binary
        id: build
        run: |
          set -euo pipefail
          go build -trimpath -ldflags "-s -w" -o /tmp/uncluster ./cmd/uncluster
          # Place it on a system path so `sudo uncluster agent install` finds it.
          sudo install -m 0755 /tmp/uncluster /usr/local/bin/uncluster
          uncluster --help >/dev/null

      - name: bootstrap:install-sshd
        id: sshd
        # openssh-server is pre-installed on ubuntu-latest runners as of
        # 2024, but keep the apt step idempotent in case the image changes.
        run: |
          set -euo pipefail
          if ! command -v sshd >/dev/null; then
              sudo apt-get update -y
              sudo apt-get install -y --no-install-recommends openssh-server
          fi
          sudo systemctl enable --now ssh
          sudo systemctl is-active --quiet ssh

      - name: bootstrap:cp-bootstrap
        id: cp-bs
        run: |
          set -euo pipefail
          # Use a runner-local data dir so we do not collide with whatever
          # the action runner might persist between jobs (we run on
          # ubuntu-latest which is fresh per-job, but defensive).
          export XDG_DATA_HOME=/tmp/uncluster-ci/data
          mkdir -p "${XDG_DATA_HOME}"
          uncluster server bootstrap --label ci-bootstrap > /tmp/bs.out
          cat /tmp/bs.out
          # Stash the caller token for later steps.
          awk '/caller token \(shown ONCE/{getline; gsub(/^[[:space:]]+/,""); print; exit}' \
              /tmp/bs.out > /tmp/caller-token
          test -s /tmp/caller-token

      - name: bootstrap:cp-start
        id: cp-start
        # Background the CP. The trap on the surrounding step is implicit:
        # job teardown kills runner processes. We track the pid so the
        # collect step can scrape it.
        run: |
          set -euo pipefail
          export XDG_DATA_HOME=/tmp/uncluster-ci/data
          nohup uncluster server start --addr 127.0.0.1:17777 \
              > /tmp/cp.log 2>&1 &
          echo $! > /tmp/cp.pid
          # Wait for healthz.
          for _ in $(seq 1 30); do
              if curl -fsS http://127.0.0.1:17777/healthz >/dev/null 2>&1; then
                  echo "cp up"
                  exit 0
              fi
              sleep 1
          done
          echo "cp never became healthy"
          tail -50 /tmp/cp.log || true
          exit 1

      - name: rendezvous:mint-join-token
        id: mint-join
        run: |
          set -euo pipefail
          CALLER_TOK="$(cat /tmp/caller-token)"
          resp="$(curl -fsS -X POST http://127.0.0.1:17777/v1/tokens \
              -H "Authorization: Bearer ${CALLER_TOK}" \
              -H "Content-Type: application/json" \
              -d '{"kind":"join","label":"ci-join"}')"
          echo "${resp}" | jq -r '.token' > /tmp/join-token
          test -s /tmp/join-token

      - name: product:agent-join
        id: agent-join
        run: |
          set -euo pipefail
          sudo env UNCLUSTER_TOKEN="$(cat /tmp/join-token)" \
              uncluster agent join \
                  --server http://127.0.0.1:17777 \
                  --name ci-agent

      - name: product:agent-install
        id: agent-install
        run: |
          set -euo pipefail
          sudo uncluster agent install

      - name: product:assert-service-active
        id: assert-svc
        run: |
          set -euo pipefail
          # The unit name is `com.uncluster.agent` per gatekeeper/install_unix.go.
          sudo systemctl is-active --quiet com.uncluster.agent
          sudo systemctl status com.uncluster.agent --no-pager || true

      - name: product:assert-agent-online
        id: assert-online
        # Heartbeat fires immediately on startup; second one 10s later.
        # status=online when LastSeen < 30s. Allow up to 40s for the first
        # heartbeat to land (cold start of the service).
        run: |
          set -euo pipefail
          CALLER_TOK="$(cat /tmp/caller-token)"
          for _ in $(seq 1 40); do
              status="$(curl -fsS http://127.0.0.1:17777/v1/agents \
                  -H "Authorization: Bearer ${CALLER_TOK}" \
                  | jq -r '.[] | select(.name=="ci-agent") | .last_seen_at // empty')"
              if [[ -n "${status}" && "${status}" != "null" ]]; then
                  age=$(( $(date +%s) - ${status} ))
                  if [[ "${age}" -lt 30 ]]; then
                      echo "agent online (last seen ${age}s ago)"
                      exit 0
                  fi
              fi
              sleep 1
          done
          echo "agent never reported online"
          exit 1

      - name: product:assert-doctor
        id: assert-doctor
        run: |
          set -euo pipefail
          sudo uncluster agent doctor

      - name: product:assert-sshd-drop-in
        id: assert-drop-in
        run: |
          set -euo pipefail
          test -f /etc/ssh/sshd_config.d/uncluster.conf
          sudo grep -q 'TrustedUserCAKeys' /etc/ssh/sshd_config.d/uncluster.conf
          sudo grep -q 'AuthorizedPrincipalsFile' /etc/ssh/sshd_config.d/uncluster.conf

      - name: product:assert-principals-dir-perms
        id: assert-perms
        run: |
          set -euo pipefail
          # Owner root, group uncluster, mode 0775 per install_unix.go.
          stat -c '%U:%G %a' /etc/ssh/auth_principals
          owner="$(stat -c '%U' /etc/ssh/auth_principals)"
          group="$(stat -c '%G' /etc/ssh/auth_principals)"
          mode="$(stat -c '%a' /etc/ssh/auth_principals)"
          if [[ "${owner}" != "root" || "${group}" != "uncluster" || "${mode}" != "775" ]]; then
              echo "principals dir perms wrong: ${owner}:${group} ${mode}"
              ls -la /etc/ssh/auth_principals
              exit 1
          fi

      - name: product:deprovision-and-marker
        id: deprov
        run: |
          set -euo pipefail
          CALLER_TOK="$(cat /tmp/caller-token)"
          curl -fsS -X DELETE http://127.0.0.1:17777/v1/agents/ci-agent \
              -H "Authorization: Bearer ${CALLER_TOK}"
          # Marker lands next to whichever agent.toml the service process
          # actually loaded from. Post-#77 fix the service reads from
          # /etc/uncluster/agent.toml so the marker lands at
          # /etc/uncluster/.deprovisioned. Allow up to 15s for the agent
          # to heartbeat, see 410, wipe, write the marker, and exit.
          marker="/etc/uncluster/.deprovisioned"
          for _ in $(seq 1 15); do
              if sudo test -f "${marker}"; then
                  echo "marker present at ${marker}"
                  break
              fi
              sleep 1
          done
          if ! sudo test -f "${marker}"; then
              echo "marker not found at ${marker}; searching"
              sudo find / -name ".deprovisioned" 2>/dev/null || true
              exit 1
          fi
          # Principals dir should be empty (all per-user files wiped).
          remaining="$(sudo find /etc/ssh/auth_principals -mindepth 1 -maxdepth 1 -type f | wc -l)"
          if [[ "${remaining}" -ne 0 ]]; then
              echo "expected empty principals after deprovision; found ${remaining} files"
              sudo ls -la /etc/ssh/auth_principals
              exit 1
          fi

      - name: collect:artifacts
        if: always()
        run: |
          set +e
          mkdir -p t2-linux-artifacts
          sudo journalctl -u com.uncluster.agent --no-pager > t2-linux-artifacts/agent-journal.txt 2>&1
          sudo journalctl -u ssh --no-pager --since "10 minutes ago" > t2-linux-artifacts/ssh-journal.txt 2>&1
          cp /tmp/cp.log t2-linux-artifacts/cp.log 2>/dev/null || true
          sudo cat /etc/ssh/sshd_config.d/uncluster.conf > t2-linux-artifacts/sshd-drop-in.conf 2>&1
          sudo cat /etc/ssh/uncluster_ca.pub > t2-linux-artifacts/ca.pub 2>&1
          sudo ls -la /etc/ssh/auth_principals > t2-linux-artifacts/principals-listing.txt 2>&1
          sudo sshd -T > t2-linux-artifacts/sshd-T.txt 2>&1
          sudo systemctl status com.uncluster.agent --no-pager > t2-linux-artifacts/svc-status.txt 2>&1
          # Per-user path (where `agent join` writes) and system path
          # (where `agent install` copies; what the service reads).
          for d in "${HOME}/.config/uncluster" /etc/uncluster; do
              if sudo test -d "${d}"; then
                  safe="$(echo "${d}" | tr '/' '_')"
                  sudo ls -la "${d}" > "t2-linux-artifacts/cfg${safe}.txt" 2>&1 || true
                  sudo cat "${d}/agent.toml" > "t2-linux-artifacts/agent-toml${safe}.txt" 2>&1 || true
              fi
          done
          ls -la t2-linux-artifacts
        continue-on-error: true

      - name: collect:classify-and-upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: t2-linux-${{ github.run_id }}
          path: t2-linux-artifacts/
          if-no-files-found: warn
          retention-days: 14

      - name: enforce-taxonomy
        if: always()
        run: |
          ./scripts/ci/classify-step.sh \
              "bootstrap:build-binary=${{ steps.build.outcome }}" \
              "bootstrap:install-sshd=${{ steps.sshd.outcome }}" \
              "bootstrap:cp-bootstrap=${{ steps.cp-bs.outcome }}" \
              "bootstrap:cp-start=${{ steps.cp-start.outcome }}" \
              "rendezvous:mint-join-token=${{ steps.mint-join.outcome }}" \
              "product:agent-join=${{ steps.agent-join.outcome }}" \
              "product:agent-install=${{ steps.agent-install.outcome }}" \
              "product:assert-service-active=${{ steps.assert-svc.outcome }}" \
              "product:assert-agent-online=${{ steps.assert-online.outcome }}" \
              "product:assert-doctor=${{ steps.assert-doctor.outcome }}" \
              "product:assert-sshd-drop-in=${{ steps.assert-drop-in.outcome }}" \
              "product:assert-principals-dir-perms=${{ steps.assert-perms.outcome }}" \
              "product:deprovision-and-marker=${{ steps.deprov.outcome }}" \
              > /tmp/classify.out
          cat /tmp/classify.out
          class="$(grep -E '^class=' /tmp/classify.out | cut -d= -f2)"
          case "${class}" in
              success)  exit 0 ;;
              advisory) echo "::warning::T2-linux advisory failure (bootstrap/rendezvous); see artifacts"; exit 0 ;;
              required) echo "::error::T2-linux REQUIRED failure (product). Block merge."; exit 1 ;;
              *)        echo "::error::T2-linux unknown class=${class}"; exit 1 ;;
          esac

  # T2-windows loopback install smoke per ADR-0008.
  # Exercises the REAL `uncluster agent install` flow on a clean
  # windows-latest runner: SCM service install, virtual-account ACLs,
  # OpenSSH for Windows drop-in, heartbeat + doctor + deprovision.
  #
  # This is the per-PR catch for Windows SCM + icacls regressions
  # (the equivalent of #50 on Windows). All steps are PowerShell-based.
  #
  # Like T2-linux, this hits the same agent.toml-path bug tracked in
  # #77 — the service runs as `NT SERVICE\UnclusterAgent` whose
  # USERPROFILE is `C:\Windows\System32\config\systemprofile`, but
  # `agent join` writes to the operator's USERPROFILE. The mirror step
  # is the same temporary workaround pattern as T2-linux and goes away
  # with the same upstream fix.
  t2-windows-install-smoke:
    runs-on: windows-latest
    timeout-minutes: 15
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: bootstrap:build-binary
        id: build
        run: |
          go build -trimpath -ldflags "-s -w" -o C:\uncluster\uncluster.exe .\cmd\uncluster
          # Add to PATH so `uncluster` resolves directly.
          Add-Content -Path $env:GITHUB_PATH -Value "C:\uncluster"
          # Smoke-check.
          & C:\uncluster\uncluster.exe --help | Out-Null

      - name: bootstrap:install-sshd
        id: sshd
        # OpenSSH.Server is preinstalled on windows-latest runners as of
        # 2024; keep the install step idempotent in case the image changes.
        run: |
          $cap = Get-WindowsCapability -Online -Name 'OpenSSH.Server*'
          if ($cap.State -ne 'Installed') {
              Add-WindowsCapability -Online -Name 'OpenSSH.Server~~~~0.0.1.0'
          }
          Set-Service -Name sshd -StartupType Automatic
          Start-Service sshd
          # Wait briefly for sshd to become ready.
          $deadline = (Get-Date).AddSeconds(20)
          while ((Get-Date) -lt $deadline) {
              if ((Get-Service sshd).Status -eq 'Running') { break }
              Start-Sleep -Seconds 1
          }
          if ((Get-Service sshd).Status -ne 'Running') {
              throw "sshd never started"
          }

      - name: bootstrap:cp-bootstrap
        id: cp-bs
        run: |
          # Use explicit --db and --ca paths so we don't depend on env-var
          # propagation across steps / process boundaries (the scheduled
          # task that hosts the CP runs in a fresh environment).
          New-Item -ItemType Directory -Force -Path C:\uncluster-data | Out-Null
          $out = & C:\uncluster\uncluster.exe server bootstrap `
              --db C:\uncluster-data\uncluster.db `
              --ca C:\uncluster-data\ca `
              --label ci-bootstrap 2>&1
          $out | Set-Content C:\bs.out
          Write-Host $out
          # Parse the caller token. Format: "caller token (shown ONCE...):\n  <token>"
          $lines = Get-Content C:\bs.out
          $idx = -1
          for ($i = 0; $i -lt $lines.Length; $i++) {
              if ($lines[$i] -match 'caller token \(shown ONCE') { $idx = $i + 1; break }
          }
          if ($idx -lt 0) { throw "caller token line not found in bootstrap output" }
          $tok = $lines[$idx].Trim()
          if (-not $tok) { throw "caller token was empty" }
          Set-Content -Path C:\caller-token -Value $tok -NoNewline -Encoding ASCII

      - name: bootstrap:cp-start
        id: cp-start
        # Critical: PowerShell's `Start-Process` does NOT detach the child
        # from the step's job object. When the step ends, GH Actions reaps
        # the child via job-object semantics and the CP dies before the next
        # step runs. Same for `Start-Job`. The cleanest way to spawn a
        # process that survives the step boundary is to install it as a
        # scheduled task and start the task — Windows Task Scheduler
        # entirely-detaches the spawned process from any parent job.
        shell: cmd
        run: |
          schtasks /Create /TN UnclusterCP /SC ONCE /ST 23:59 /F ^
              /TR "cmd /c C:\uncluster\uncluster.exe server start --addr 127.0.0.1:17777 --db C:\uncluster-data\uncluster.db --ca C:\uncluster-data\ca > C:\cp.log 2> C:\cp.err" || exit /b 1
          schtasks /Run /TN UnclusterCP || exit /b 1
          rem Wait for healthz (loop in cmd is awkward — defer to powershell).
          powershell -NoProfile -Command "$deadline = (Get-Date).AddSeconds(30); $ok = $false; while ((Get-Date) -lt $deadline) { try { $r = Invoke-WebRequest -UseBasicParsing -Uri http://127.0.0.1:17777/healthz -TimeoutSec 2; if ($r.StatusCode -eq 200) { $ok = $true; break } } catch {}; Start-Sleep -Seconds 1 }; if (-not $ok) { Get-Content C:\cp.log -ErrorAction SilentlyContinue; Get-Content C:\cp.err -ErrorAction SilentlyContinue; exit 1 }" || exit /b 1

      - name: rendezvous:mint-join-token
        id: mint-join
        run: |
          $tok = Get-Content C:\caller-token -Raw
          $headers = @{ 'Authorization' = "Bearer $tok"; 'Content-Type' = 'application/json' }
          $body = '{"kind":"join","label":"ci-join"}'
          $r = Invoke-RestMethod -Method Post -Uri http://127.0.0.1:17777/v1/tokens -Headers $headers -Body $body
          $r.token | Set-Content C:\join-token -NoNewline -Encoding ASCII
          if (-not (Get-Content C:\join-token -Raw)) { throw "join token empty" }

      - name: product:agent-join
        id: agent-join
        run: |
          $env:UNCLUSTER_TOKEN = Get-Content C:\join-token -Raw
          & C:\uncluster\uncluster.exe agent join `
              --server http://127.0.0.1:17777 `
              --name ci-agent

      - name: product:agent-install
        id: agent-install
        # windows-latest runners are Administrator by default per GH docs.
        run: |
          & C:\uncluster\uncluster.exe agent install

      - name: product:assert-service-running
        id: assert-svc
        run: |
          $svc = Get-Service UnclusterAgent
          if ($svc.Status -ne 'Running') {
              throw "UnclusterAgent not running: $($svc.Status)"
          }
          if ($svc.StartType -ne 'Automatic') {
              throw "UnclusterAgent StartType=$($svc.StartType), want Automatic"
          }
          Get-Service UnclusterAgent | Format-Table -AutoSize

      - name: product:assert-agent-online
        id: assert-online
        run: |
          $tok = Get-Content C:\caller-token -Raw
          $headers = @{ 'Authorization' = "Bearer $tok" }
          $deadline = (Get-Date).AddSeconds(40)
          while ((Get-Date) -lt $deadline) {
              try {
                  $agents = Invoke-RestMethod -Uri http://127.0.0.1:17777/v1/agents -Headers $headers
                  $ci = $agents | Where-Object { $_.name -eq 'ci-agent' } | Select-Object -First 1
                  if ($ci -and $ci.last_seen_at) {
                      $age = [int]((Get-Date -UFormat %s) - $ci.last_seen_at)
                      if ($age -lt 30) {
                          Write-Host "agent online (last seen $age s ago)"
                          exit 0
                      }
                  }
              } catch { }
              Start-Sleep -Seconds 1
          }
          throw "agent never reported online"

      - name: product:assert-doctor
        id: assert-doctor
        run: |
          & C:\uncluster\uncluster.exe agent doctor
          if ($LASTEXITCODE -ne 0) { throw "doctor exit=$LASTEXITCODE" }

      - name: product:assert-sshd-drop-in
        id: assert-drop-in
        run: |
          $p = 'C:\ProgramData\ssh\sshd_config.d\uncluster.conf'
          if (-not (Test-Path $p)) { throw "drop-in not found at $p" }
          $content = Get-Content $p -Raw
          if ($content -notmatch 'TrustedUserCAKeys') { throw "missing TrustedUserCAKeys" }
          if ($content -notmatch 'AuthorizedPrincipalsFile') { throw "missing AuthorizedPrincipalsFile" }

      - name: product:assert-principals-acl
        id: assert-acl
        run: |
          $dir = 'C:\ProgramData\ssh\auth_principals'
          if (-not (Test-Path $dir)) { throw "principals dir not found at $dir" }
          $acl = icacls $dir 2>&1 | Out-String
          Write-Host $acl
          # Expect an entry granting UnclusterAgent virtual account write.
          if ($acl -notmatch 'UnclusterAgent') {
              throw "principals dir ACL missing UnclusterAgent virtual account"
          }

      - name: product:deprovision-and-marker
        id: deprov
        run: |
          $tok = Get-Content C:\caller-token -Raw
          $headers = @{ 'Authorization' = "Bearer $tok" }
          Invoke-RestMethod -Method Delete -Uri http://127.0.0.1:17777/v1/agents/ci-agent -Headers $headers | Out-Null
          # Post-#77 fix the service loads agent.toml from the system path,
          # so the marker lands at $env:PROGRAMDATA\uncluster\.deprovisioned.
          $marker = (Join-Path $env:PROGRAMDATA 'uncluster\.deprovisioned')
          $deadline = (Get-Date).AddSeconds(15)
          $found = $false
          while ((Get-Date) -lt $deadline) {
              if (Test-Path $marker) { $found = $true; break }
              Start-Sleep -Seconds 1
          }
          if (-not $found) {
              Write-Host "marker not found at $marker; searching"
              Get-ChildItem -Path C:\ -Filter '.deprovisioned' -Recurse -ErrorAction SilentlyContinue |
                  Select-Object FullName | Format-Table -AutoSize
              throw "marker missing"
          }
          # Principals dir should be empty.
          $remaining = (Get-ChildItem -File -Path 'C:\ProgramData\ssh\auth_principals' -ErrorAction SilentlyContinue | Measure-Object).Count
          if ($remaining -ne 0) {
              Write-Host "principals not empty: $remaining files remain"
              Get-ChildItem -Path 'C:\ProgramData\ssh\auth_principals' | Format-Table -AutoSize
              throw "principals not wiped"
          }

      - name: collect:artifacts
        if: always()
        # Best-effort scrape. Robust against missing files (any step may
        # have failed before its data landed).
        run: |
          New-Item -ItemType Directory -Force -Path t2-windows-artifacts | Out-Null
          $ErrorActionPreference = 'Continue'
          # Event Viewer logs filtered to our service + sshd.
          try {
              Get-WinEvent -LogName 'Application' -MaxEvents 200 -ErrorAction SilentlyContinue |
                  Where-Object { $_.ProviderName -match 'Uncluster|UnclusterAgent|sshd|OpenSSH' } |
                  Format-List | Out-File t2-windows-artifacts\events-application.txt
          } catch { }
          try {
              Get-WinEvent -LogName 'System' -MaxEvents 200 -ErrorAction SilentlyContinue |
                  Where-Object { $_.ProviderName -match 'Service Control Manager' } |
                  Format-List | Out-File t2-windows-artifacts\events-system.txt
          } catch { }
          Get-Content C:\cp.log -ErrorAction SilentlyContinue | Out-File t2-windows-artifacts\cp.log
          Get-Content C:\cp.err -ErrorAction SilentlyContinue | Out-File t2-windows-artifacts\cp.err
          Get-Content 'C:\ProgramData\ssh\sshd_config.d\uncluster.conf' -ErrorAction SilentlyContinue | Out-File t2-windows-artifacts\sshd-drop-in.conf
          Get-Content 'C:\ProgramData\ssh\uncluster_ca.pub' -ErrorAction SilentlyContinue | Out-File t2-windows-artifacts\ca.pub
          icacls 'C:\ProgramData\ssh\auth_principals' 2>&1 | Out-File t2-windows-artifacts\principals-acl.txt
          Get-ChildItem -Force 'C:\ProgramData\ssh\auth_principals' -ErrorAction SilentlyContinue |
              Format-Table -AutoSize | Out-File t2-windows-artifacts\principals-listing.txt
          sc.exe qc UnclusterAgent | Out-File t2-windows-artifacts\sc-qc.txt 2>$null
          # Get-Service writes a non-terminating error if the service does
          # not exist. Use -ErrorAction Stop to convert it to terminating
          # so try/catch actually catches; default non-terminating errors
          # bypass try/catch in PowerShell.
          try {
              Get-Service -Name UnclusterAgent -ErrorAction Stop | Format-List | Out-File t2-windows-artifacts\service-detail.txt
          } catch {
              "UnclusterAgent service not present: $($_.Exception.Message)" | Out-File t2-windows-artifacts\service-detail.txt
          }
          # Per-user path (where `agent join` writes) and the system path
          # (where `agent install` copies; what the service reads).
          Get-ChildItem -Force -Recurse -Path 'C:\Users\runneradmin\.config\uncluster' -ErrorAction SilentlyContinue |
              Format-Table | Out-File t2-windows-artifacts\cfg-user.txt
          Get-Content 'C:\Users\runneradmin\.config\uncluster\agent.toml' -ErrorAction SilentlyContinue |
              Out-File t2-windows-artifacts\agent-toml-user.txt
          $sys = Join-Path $env:PROGRAMDATA 'uncluster'
          Get-ChildItem -Force -Recurse -Path $sys -ErrorAction SilentlyContinue |
              Format-Table | Out-File t2-windows-artifacts\cfg-system.txt
          Get-Content (Join-Path $sys 'agent.toml') -ErrorAction SilentlyContinue |
              Out-File t2-windows-artifacts\agent-toml-system.txt
          Get-ChildItem t2-windows-artifacts | Format-Table -AutoSize

      - name: collect:upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: t2-windows-${{ github.run_id }}
          path: t2-windows-artifacts/
          if-no-files-found: warn
          retention-days: 14

      - name: enforce-taxonomy
        if: always()
        shell: bash
        # Use bash for the classifier script (it's bash). The runner has
        # bash via git bash.
        run: |
          ./scripts/ci/classify-step.sh \
              "bootstrap:build-binary=${{ steps.build.outcome }}" \
              "bootstrap:install-sshd=${{ steps.sshd.outcome }}" \
              "bootstrap:cp-bootstrap=${{ steps.cp-bs.outcome }}" \
              "bootstrap:cp-start=${{ steps.cp-start.outcome }}" \
              "rendezvous:mint-join-token=${{ steps.mint-join.outcome }}" \
              "product:agent-join=${{ steps.agent-join.outcome }}" \
              "product:agent-install=${{ steps.agent-install.outcome }}" \
              "product:assert-service-running=${{ steps.assert-svc.outcome }}" \
              "product:assert-agent-online=${{ steps.assert-online.outcome }}" \
              "product:assert-doctor=${{ steps.assert-doctor.outcome }}" \
              "product:assert-sshd-drop-in=${{ steps.assert-drop-in.outcome }}" \
              "product:assert-principals-acl=${{ steps.assert-acl.outcome }}" \
              "product:deprovision-and-marker=${{ steps.deprov.outcome }}" \
              > /tmp/classify.out
          cat /tmp/classify.out
          class="$(grep -E '^class=' /tmp/classify.out | cut -d= -f2)"
          case "${class}" in
              success)  exit 0 ;;
              advisory) echo "::warning::T2-windows advisory failure"; exit 0 ;;
              required) echo "::error::T2-windows REQUIRED failure. Block merge."; exit 1 ;;
              *)        echo "::error::T2-windows unknown class=${class}"; exit 1 ;;
          esac

  # T2-mac SPIKE per ADR-0008 + #71.
  #
  # ADVISORY job — NOT a merge gate. `continue-on-error: true` at the job
  # level converts any failure to a warning. NOT added to
  # `all-tests-pass`'s needs list. Promote to required (flip
  # continue-on-error to false + add to all-tests-pass) only after N
  # consecutive empirical greens — operator's call, suggested N=20
  # (separate one-line follow-up issue when ready).
  #
  # Why advisory: hosted macos-latest is arm64 and the install path
  # mutates sshd (`launchctl`), /etc/ssh, system users via dscl,
  # ACLs — exactly the surface Apple's privacy + SIP machinery may
  # gate even when normal builds pass. If install steps hit interactive
  # Full Disk Access / Privacy prompts that can't be automated, the
  # spike itself becomes the data point: file a follow-up issue titled
  # "T2-mac blocker: <root cause>" and STOP — DO NOT loop retry.
  t2-mac-install-smoke:
    runs-on: macos-latest
    timeout-minutes: 12
    continue-on-error: true  # spike posture; failures are warnings, not gates
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: bootstrap:build-binary
        id: build
        run: |
          set -euo pipefail
          go build -trimpath -ldflags "-s -w" -o /tmp/uncluster ./cmd/uncluster
          sudo install -m 0755 /tmp/uncluster /usr/local/bin/uncluster
          uncluster --help >/dev/null

      - name: preflight:system-id-capacity
        id: preflight
        # Read-only capacity probe for #96. The independent-allocation fix
        # (separate UID + GID scans of 200-499) succeeds whenever the host
        # has ANY free UID AND ANY free GID in that window — they need not
        # match. But a hosted macos-latest runner whose 200-499 window is
        # fully packed in EITHER namespace has no allocatable system-ID space
        # at all, and no production fix can conjure one (widening the range is
        # a rejected approach per #96 — 0-199 is Apple-reserved, 500+ is the
        # interactive-user range). This step records the empirical counts so
        # the outcome is visible in artifacts either way, and emits outputs
        # that gate the account-creation tail below.
        run: |
          set -uo pipefail
          mkdir -p t2-mac-artifacts
          pf=t2-mac-artifacts/preflight.txt
          {
            echo "===== sw_vers ====="
            sw_vers || true
            echo
            echo "===== sysadminctl capability (-h) ====="
            # sysadminctl -h prints usage incl. -addUser/-roleAccount support.
            sysadminctl -h 2>&1 || true
            echo
            echo "===== used UIDs (dscl . -list /Users UniqueID) ====="
            dscl . -list /Users UniqueID 2>/dev/null | sort -k2 -n || true
            echo
            echo "===== used GIDs (dscl . -list /Groups PrimaryGroupID) ====="
            dscl . -list /Groups PrimaryGroupID 2>/dev/null | sort -k2 -n || true
          } | tee "$pf"

          # Build the set of in-use UIDs/GIDs and scan the 200-499 window.
          used_uids="$(dscl . -list /Users UniqueID 2>/dev/null | awk '{print $2}')"
          used_gids="$(dscl . -list /Groups PrimaryGroupID 2>/dev/null | awk '{print $2}')"

          free_uid=""
          free_gid=""
          for id in $(seq 499 -1 200); do
            if [ -z "$free_uid" ] && ! echo "$used_uids" | grep -qx "$id"; then
              free_uid="$id"
            fi
            if [ -z "$free_gid" ] && ! echo "$used_gids" | grep -qx "$id"; then
              free_gid="$id"
            fi
          done

          # Count totals for the artifact.
          free_uid_count=0
          free_gid_count=0
          for id in $(seq 499 -1 200); do
            echo "$used_uids" | grep -qx "$id" || free_uid_count=$((free_uid_count+1))
            echo "$used_gids" | grep -qx "$id" || free_gid_count=$((free_gid_count+1))
          done

          {
            echo
            echo "===== #96 independent-allocation capacity (200-499) ====="
            echo "free_uid_count=${free_uid_count}"
            echo "free_gid_count=${free_gid_count}"
            echo "first_free_uid=${free_uid:-NONE}"
            echo "first_free_gid=${free_gid:-NONE}"
          } | tee -a "$pf"

          has_uid=false; [ -n "$free_uid" ] && has_uid=true
          has_gid=false; [ -n "$free_gid" ] && has_gid=true
          has_space=false; { [ "$has_uid" = true ] && [ "$has_gid" = true ]; } && has_space=true

          {
            echo "has_free_uid=${has_uid}"
            echo "has_free_gid=${has_gid}"
            echo "has_free_id_space=${has_space}"
          } >> "$GITHUB_OUTPUT"

          if [ "$has_space" = true ]; then
            echo "::notice::T2-mac preflight: free UID(s)=${free_uid_count}, free GID(s)=${free_gid_count} in 200-499 — independent allocation can run; account tail EXPECTED-GREEN."
          else
            echo "::warning::T2-mac preflight: no allocatable system-ID space (free_uid_count=${free_uid_count}, free_gid_count=${free_gid_count}); account-creation tail will be documented advisory-xfail per #96/ADR-0008."
          fi

      - name: bootstrap:enable-remote-login
        id: remote-login
        # The spike-blocker step. On hosted macos-latest, enabling Remote
        # Login via `systemsetup -setremotelogin on` may require
        # interactive Full Disk Access — a TCC privacy prompt that
        # cannot be answered headlessly. If this step fails with the
        # "Remote Login: Off" output or a TCC-style error, the comment
        # below documents the expected blocker and the job stops here
        # advisory-style.
        run: |
          set -euo pipefail
          # Try the official path. If it errors with TCC / privacy, the
          # follow-up step's grep on `getremotelogin` will surface the
          # blocker without the workflow needing to interpret arbitrary
          # error text.
          sudo systemsetup -setremotelogin on || true
          # Verify. If still Off, we hit the spike blocker.
          state="$(sudo systemsetup -getremotelogin 2>&1 || true)"
          echo "${state}"
          if ! echo "${state}" | grep -qi 'Remote Login: On'; then
              echo "::warning::T2-mac SPIKE BLOCKED: Remote Login could not be enabled headlessly on macos-latest."
              echo "::warning::This is the documented spike outcome (#71). Falling out of the smoke without further retries; the gap itself is the data point."
              echo "spike_blocked=true" >> "$GITHUB_OUTPUT"
              exit 0
          fi
          echo "spike_blocked=false" >> "$GITHUB_OUTPUT"

      - name: bootstrap:cp-bootstrap
        id: cp-bs
        if: steps.remote-login.outputs.spike_blocked != 'true'
        run: |
          set -euo pipefail
          export XDG_DATA_HOME=/tmp/uncluster-ci/data
          mkdir -p "${XDG_DATA_HOME}"
          uncluster server bootstrap --label ci-bootstrap > /tmp/bs.out
          cat /tmp/bs.out
          awk '/caller token \(shown ONCE/{getline; gsub(/^[[:space:]]+/,""); print; exit}' \
              /tmp/bs.out > /tmp/caller-token
          test -s /tmp/caller-token

      - name: bootstrap:cp-start
        id: cp-start
        if: steps.remote-login.outputs.spike_blocked != 'true'
        run: |
          set -euo pipefail
          export XDG_DATA_HOME=/tmp/uncluster-ci/data
          nohup uncluster server start --addr 127.0.0.1:17777 \
              > /tmp/cp.log 2>&1 &
          echo $! > /tmp/cp.pid
          for _ in $(seq 1 30); do
              if curl -fsS http://127.0.0.1:17777/healthz >/dev/null 2>&1; then
                  echo "cp up"
                  exit 0
              fi
              sleep 1
          done
          tail -50 /tmp/cp.log || true
          exit 1

      - name: rendezvous:mint-join-token
        id: mint-join
        if: steps.remote-login.outputs.spike_blocked != 'true'
        run: |
          set -euo pipefail
          CALLER_TOK="$(cat /tmp/caller-token)"
          resp="$(curl -fsS -X POST http://127.0.0.1:17777/v1/tokens \
              -H "Authorization: Bearer ${CALLER_TOK}" \
              -H "Content-Type: application/json" \
              -d '{"kind":"join","label":"ci-join"}')"
          echo "${resp}" | jq -r '.token' > /tmp/join-token
          test -s /tmp/join-token

      - name: product:agent-join
        id: agent-join
        if: steps.remote-login.outputs.spike_blocked != 'true'
        run: |
          set -euo pipefail
          sudo env UNCLUSTER_TOKEN="$(cat /tmp/join-token)" \
              uncluster agent join \
                  --server http://127.0.0.1:17777 \
                  --name ci-agent

      - name: product:agent-install
        id: agent-install
        # Account-creation tail (#96): gated on free system-ID space. If the
        # hosted runner has no allocatable UID/GID in 200-499 even after the
        # independent-allocation fix, this and the steps below are SKIPPED
        # (documented advisory-xfail), not failed — see account-tail-xfail-notice.
        if: steps.remote-login.outputs.spike_blocked != 'true' && steps.preflight.outputs.has_free_id_space == 'true'
        # The other spike-pressure point: `sudo uncluster agent install`
        # creates `_uncluster` via dscl, writes /Library/LaunchDaemons,
        # mutates /etc/ssh, calls launchctl. Any of these may need
        # privileges hosted macos-latest does not grant headlessly.
        run: |
          set -euo pipefail
          sudo uncluster agent install

      - name: product:assert-service-loaded
        id: assert-svc
        if: steps.remote-login.outputs.spike_blocked != 'true' && steps.preflight.outputs.has_free_id_space == 'true'
        run: |
          set -euo pipefail
          out="$(sudo launchctl list com.uncluster.agent 2>&1 || true)"
          echo "${out}"
          # Expect launchctl-list output to include "PID" with a non-zero value.
          if ! echo "${out}" | grep -qE '"PID" = [1-9]'; then
              echo "service launchd plist did not load with running PID"
              exit 1
          fi

      - name: product:assert-agent-online
        id: assert-online
        if: steps.remote-login.outputs.spike_blocked != 'true' && steps.preflight.outputs.has_free_id_space == 'true'
        run: |
          set -euo pipefail
          CALLER_TOK="$(cat /tmp/caller-token)"
          for _ in $(seq 1 40); do
              status="$(curl -fsS http://127.0.0.1:17777/v1/agents \
                  -H "Authorization: Bearer ${CALLER_TOK}" \
                  | jq -r '.[] | select(.name=="ci-agent") | .last_seen_at // empty')"
              if [[ -n "${status}" && "${status}" != "null" ]]; then
                  age=$(( $(date +%s) - ${status} ))
                  if [[ "${age}" -lt 30 ]]; then
                      echo "agent online (last seen ${age}s ago)"
                      exit 0
                  fi
              fi
              sleep 1
          done
          echo "agent never reported online"
          exit 1

      - name: product:assert-doctor
        id: assert-doctor
        # Post-install doctor — depends on the account/group/service the
        # install tail creates, so it is gated with the rest of the tail.
        if: steps.remote-login.outputs.spike_blocked != 'true' && steps.preflight.outputs.has_free_id_space == 'true'
        run: |
          set -euo pipefail
          sudo uncluster agent doctor

      - name: product:assert-sshd-drop-in
        id: assert-drop-in
        if: steps.remote-login.outputs.spike_blocked != 'true' && steps.preflight.outputs.has_free_id_space == 'true'
        run: |
          set -euo pipefail
          # Sonoma+ supports sshd_config.d directly; pre-Sonoma needs
          # an Include shim in /etc/ssh/sshd_config. The install step
          # adds the Include line on pre-Sonoma; either path should
          # leave the drop-in readable.
          test -f /etc/ssh/sshd_config.d/uncluster.conf
          sudo grep -q 'TrustedUserCAKeys' /etc/ssh/sshd_config.d/uncluster.conf
          sudo grep -q 'AuthorizedPrincipalsFile' /etc/ssh/sshd_config.d/uncluster.conf

      - name: product:assert-service-user-and-group
        id: assert-user
        if: steps.remote-login.outputs.spike_blocked != 'true' && steps.preflight.outputs.has_free_id_space == 'true'
        # macOS service-account convention is `_uncluster` (underscore-
        # prefix system accounts). Verify the user exists with no shell AND
        # that the GROUP record exists (#96 Bug 2 — without it,
        # restrictSystemConfigACL no-ops and agent.toml stays unreadable by
        # the service account).
        run: |
          set -euo pipefail
          out="$(dscl . -read /Users/_uncluster 2>&1 || true)"
          echo "${out}"
          if ! echo "${out}" | grep -qE 'RecordName.*_uncluster'; then
              echo "service user _uncluster missing"
              exit 1
          fi
          # Confirm shell is /usr/bin/false (or similar non-login).
          if ! echo "${out}" | grep -qiE 'UserShell.*(false|nologin)'; then
              echo "service user _uncluster has interactive shell"
              exit 1
          fi
          # #96 Bug 2: the group record MUST exist so lookupServiceGroup()
          # resolves and the config-ownership chown applies.
          gout="$(dscl . -read /Groups/_uncluster 2>&1 || true)"
          echo "${gout}"
          if ! echo "${gout}" | grep -qE 'RecordName.*_uncluster'; then
              echo "service group _uncluster missing (#96 Bug 2 regression)"
              exit 1
          fi
          # #96 acceptance: system agent.toml owned root:_uncluster, mode 0640,
          # readable by the service account (no silent no-op).
          ls -le /etc/uncluster/agent.toml || true
          owner_group="$(stat -f '%Su:%Sg' /etc/uncluster/agent.toml)"
          echo "agent.toml owner:group = ${owner_group}"
          if [ "${owner_group}" != "root:_uncluster" ]; then
              echo "system agent.toml not owned root:_uncluster (got ${owner_group}) — config-ACL grant did not apply (#96)"
              exit 1
          fi
          # Confirm the service account can actually read it.
          if ! sudo -u _uncluster test -r /etc/uncluster/agent.toml; then
              echo "_uncluster cannot read /etc/uncluster/agent.toml (#96 acceptance failure)"
              exit 1
          fi
          echo "agent.toml is root:_uncluster 0640 and readable by _uncluster"

      - name: account-tail-xfail-notice
        id: xfail-notice
        # Fires only when the runner has NO allocatable system-ID space and we
        # were not already spike-blocked at Remote Login. Documents the
        # advisory-xfail of the account-creation/service-start/doctor tail per
        # #96 + ADR-0008's failure taxonomy. This is NOT a hard failure (the
        # job is advisory anyway) and there is NO retry loop — the gap is the
        # data point; real account creation is validated on T4 hardware (#16).
        if: steps.remote-login.outputs.spike_blocked != 'true' && steps.preflight.outputs.has_free_id_space != 'true'
        run: |
          set -euo pipefail
          reason="[advisory-xfail] hosted macOS runner has no allocatable system-ID space; real account creation validated on T4 hardware per ADR-0008"
          echo "::warning::T2-mac: ${reason}"
          echo "${reason}" | tee -a t2-mac-artifacts/preflight.txt
          echo "free_uid=${{ steps.preflight.outputs.has_free_uid }} free_gid=${{ steps.preflight.outputs.has_free_gid }} (need both true for the account tail)" \
              | tee -a t2-mac-artifacts/preflight.txt

      - name: collect:artifacts
        if: always()
        run: |
          set +e
          mkdir -p t2-mac-artifacts
          sudo launchctl list com.uncluster.agent > t2-mac-artifacts/launchctl.txt 2>&1
          sudo log show --last 5m --predicate 'subsystem == "com.uncluster.agent" OR senderImagePath CONTAINS "uncluster"' > t2-mac-artifacts/log-show.txt 2>&1
          cp /tmp/cp.log t2-mac-artifacts/cp.log 2>/dev/null || true
          sudo cat /etc/ssh/sshd_config.d/uncluster.conf > t2-mac-artifacts/sshd-drop-in.conf 2>&1
          sudo cat /etc/ssh/uncluster_ca.pub > t2-mac-artifacts/ca.pub 2>&1
          sudo ls -la /etc/ssh/auth_principals > t2-mac-artifacts/principals-listing.txt 2>&1
          sudo sshd -T > t2-mac-artifacts/sshd-T.txt 2>&1
          sudo dscl . -read /Users/_uncluster > t2-mac-artifacts/dscl-user.txt 2>&1
          sudo dscl . -read /Groups/_uncluster > t2-mac-artifacts/dscl-group.txt 2>&1
          sudo ls -le /etc/uncluster/agent.toml > t2-mac-artifacts/agent-toml-perms.txt 2>&1
          ls -la t2-mac-artifacts

      - name: collect:upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: t2-mac-${{ github.run_id }}
          path: t2-mac-artifacts/
          if-no-files-found: warn
          retention-days: 14

      - name: spike-status
        if: always()
        # NOT enforce-taxonomy — we are explicitly advisory. This step
        # just records what happened so a future operator deciding
        # promote-to-required has a single line to read per run.
        #
        # #96: distinguish three outcomes explicitly —
        #   (a) Remote-Login spike-blocked (pre-existing #71 gap),
        #   (b) account tail advisory-xfail'd because the runner has no free
        #       system-ID space (skipped, NOT failed — the documented #96 tail),
        #   (c) ran the account tail (ID space existed) — report pass/fail.
        # In every case the UPSTREAM steps (build/preflight/bootstrap/start/
        # mint/join) are expected-green; a failure THERE is a real regression
        # even though the job is advisory.
        run: |
          if [[ "${{ steps.remote-login.outputs.spike_blocked }}" == "true" ]]; then
              echo "::notice::T2-mac SPIKE: BLOCKED at Remote Login enablement step (#71)."
              echo "Follow-up issue should be filed if this persists across multiple runs."
              exit 0
          fi

          # Upstream steps that DO NOT need the service account — must be green
          # on the hosted runner regardless of ID-space availability so the
          # job keeps its regression-catching value (#96).
          upstream_fail=0
          for step in \
              "${{ steps.cp-bs.outcome }}" \
              "${{ steps.cp-start.outcome }}" \
              "${{ steps.mint-join.outcome }}" \
              "${{ steps.agent-join.outcome }}"; do
              if [[ "${step}" == "failure" ]]; then
                  upstream_fail=1
              fi
          done
          if [[ "${upstream_fail}" == "1" ]]; then
              echo "::warning::T2-mac: an UPSTREAM expected-green step (bootstrap/start/mint/join) failed — investigate as a real regression, not an ID-space xfail. See artifacts."
          fi

          if [[ "${{ steps.preflight.outputs.has_free_id_space }}" != "true" ]]; then
              echo "::notice::T2-mac: account-creation/service-start/doctor tail ADVISORY-XFAIL (no allocatable system-ID space in 200-499). Documented per #96/ADR-0008; not a regression. Upstream steps: $([[ ${upstream_fail} == 0 ]] && echo green || echo FAILED)."
              exit 0
          fi

          # ID space existed → the account tail RAN. Aggregate it.
          tail_fail=0
          for step in \
              "${{ steps.agent-install.outcome }}" \
              "${{ steps.assert-svc.outcome }}" \
              "${{ steps.assert-online.outcome }}" \
              "${{ steps.assert-doctor.outcome }}" \
              "${{ steps.assert-drop-in.outcome }}" \
              "${{ steps.assert-user.outcome }}"; do
              if [[ "${step}" == "failure" ]]; then
                  tail_fail=1
              fi
          done
          if [[ "${tail_fail}" == "1" || "${upstream_fail}" == "1" ]]; then
              echo "::warning::T2-mac: at least one product step failed WITH free ID space available (#96 fix should have made the account tail green). See uploaded artifacts. Stays advisory until empirically green for N consecutive runs."
          else
              echo "::notice::T2-mac: all product steps passed end-to-end (independent UID/GID allocation + group record worked). Green run logged (#96)."
          fi
          exit 0

  # Aggregator job: creates a single "all-tests-pass" check that can be marked
  # as required in branch protection. This ensures ALL matrix OS variants AND
  # the E2E Compose smoke AND the per-OS install smokes must pass before a PR
  # can merge.
  all-tests-pass:
    runs-on: ubuntu-latest
    needs: [test, e2e-compose-smoke, t2-linux-install-smoke, t2-windows-install-smoke]
    if: always()
    steps:
      - name: fail if any required job failed
        run: |
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "test matrix result: ${{ needs.test.result }}"
            exit 1
          fi
          if [[ "${{ needs.e2e-compose-smoke.result }}" != "success" ]]; then
            echo "e2e-compose-smoke result: ${{ needs.e2e-compose-smoke.result }}"
            exit 1
          fi
          if [[ "${{ needs.t2-linux-install-smoke.result }}" != "success" ]]; then
            echo "t2-linux-install-smoke result: ${{ needs.t2-linux-install-smoke.result }}"
            exit 1
          fi
          if [[ "${{ needs.t2-windows-install-smoke.result }}" != "success" ]]; then
            echo "t2-windows-install-smoke result: ${{ needs.t2-windows-install-smoke.result }}"
            exit 1
          fi

  build:
    runs-on: ubuntu-latest
    needs: all-tests-pass
    strategy:
      matrix:
        include:
          - { goos: darwin,  goarch: amd64, ext: ""     }
          - { goos: darwin,  goarch: arm64, ext: ""     }
          - { goos: linux,   goarch: amd64, ext: ""     }
          - { goos: linux,   goarch: arm64, ext: ""     }
          - { goos: windows, goarch: amd64, ext: ".exe" }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -trimpath -ldflags "-s -w" -o uncluster-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} ./cmd/uncluster
      - uses: actions/upload-artifact@v4
        with:
          name: uncluster-${{ matrix.goos }}-${{ matrix.goarch }}
          path: uncluster-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        include:
          - { os: ubuntu-latest,  race: "-race" }
          - { os: windows-latest, race: ""       }
          - { os: macos-latest,   race: "-race" }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test ./... ${{ matrix.race }} -count=1

  # T1a Compose smoke per ADR-0008. Failure-taxonomy:
  #   * [REQUIRED] markers in test output → red gate (product failure)
  #   * [ADVISORY] markers (rendezvous/bootstrap) → warning only, quarantine
  #     rule escalates after 3 consecutive on main.
  # Uses `continue-on-error: true` on the test step + an explicit classifier
  # step so the gate decision is computed deliberately rather than from raw
  # exit code (the classifier is the AI-agent guardrail per ADR-0008).
  e2e-compose-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: docker info
        run: docker version && docker compose version
      - name: verify artifact collector script (mocked docker)
        run: bash test/e2e/scripts/test-collect-artifacts.sh
      - name: verify failure-taxonomy classifier (intentional-fail tests)
        run: bash scripts/ci/test-classify-step.sh
      - name: run T1a smoke
        id: smoke
        continue-on-error: true
        run: |
          set -o pipefail
          go test -tags e2e ./test/e2e/ -v -count=1 -timeout 10m 2>&1 \
              | tee /tmp/e2e-smoke.log
      - name: classify failure
        id: classify
        if: always()
        run: |
          set -euo pipefail
          log=/tmp/e2e-smoke.log
          if [[ ! -f "$log" ]]; then
              echo "no log produced — treating as required"
              echo "class=required" >> "$GITHUB_OUTPUT"
              exit 0
          fi
          if grep -q '\[REQUIRED\]' "$log"; then
              echo "found [REQUIRED] marker — product-class failure"
              echo "class=required" >> "$GITHUB_OUTPUT"
          elif grep -q '\[ADVISORY\]' "$log"; then
              echo "found [ADVISORY] marker only — bootstrap/rendezvous-class failure"
              echo "class=advisory" >> "$GITHUB_OUTPUT"
          elif [[ "${{ steps.smoke.outcome }}" == "success" ]]; then
              echo "no failure markers and smoke succeeded — clean"
              echo "class=success" >> "$GITHUB_OUTPUT"
          else
              echo "no markers but test failed — defaulting to required"
              echo "class=required" >> "$GITHUB_OUTPUT"
          fi
      - name: upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-compose-${{ github.run_id }}
          path: |
            test/e2e/_artifacts/
            /tmp/e2e-smoke.log
          if-no-files-found: warn
          retention-days: 14
      - name: enforce taxonomy
        if: always()
        run: |
          class="${{ steps.classify.outputs.class }}"
          echo "classification: ${class}"
          case "${class}" in
              success)  exit 0 ;;
              advisory) echo "::warning::e2e-compose advisory failure (rendezvous/bootstrap); see uploaded artifacts. Quarantine rule will escalate after 3 consecutive."; exit 0 ;;
              required) echo "::error::e2e-compose REQUIRED failure (product). Block merge."; exit 1 ;;
              *)        echo "::error::e2e-compose classifier produced unknown class=${class}"; exit 1 ;;
          esac

  # T2-linux loopback install smoke per ADR-0008.
  # Exercises the REAL `uncluster agent install` flow on a clean
  # ubuntu-latest runner: bootstraps a local Control plane on loopback,
  # joins+installs an Agent on the same host, asserts systemd unit + sshd
  # drop-in + principals dir + doctor pass, then deprovisions cleanly.
  #
  # This is the per-PR catch for systemd-unit-name-style install drift
  # (e.g. the `113b747` hotfix that escaped because no smoke tested the
  # actual install path). Steps follow the bootstrap/rendezvous/product
  # taxonomy from ADR-0008 — failures here are required (product class).
  t2-linux-install-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: bootstrap:build-binary
        id: build
        run: |
          set -euo pipefail
          go build -trimpath -ldflags "-s -w" -o /tmp/uncluster ./cmd/uncluster
          # Place it on a system path so `sudo uncluster agent install` finds it.
          sudo install -m 0755 /tmp/uncluster /usr/local/bin/uncluster
          uncluster --help >/dev/null

      - name: bootstrap:install-sshd
        id: sshd
        # openssh-server is pre-installed on ubuntu-latest runners as of
        # 2024, but keep the apt step idempotent in case the image changes.
        run: |
          set -euo pipefail
          if ! command -v sshd >/dev/null; then
              sudo apt-get update -y
              sudo apt-get install -y --no-install-recommends openssh-server
          fi
          sudo systemctl enable --now ssh
          sudo systemctl is-active --quiet ssh

      - name: bootstrap:cp-bootstrap
        id: cp-bs
        run: |
          set -euo pipefail
          # Use a runner-local data dir so we do not collide with whatever
          # the action runner might persist between jobs (we run on
          # ubuntu-latest which is fresh per-job, but defensive).
          export XDG_DATA_HOME=/tmp/uncluster-ci/data
          mkdir -p "${XDG_DATA_HOME}"
          uncluster server bootstrap --label ci-bootstrap > /tmp/bs.out
          cat /tmp/bs.out
          # Stash the caller token for later steps.
          awk '/caller token \(shown ONCE/{getline; gsub(/^[[:space:]]+/,""); print; exit}' \
              /tmp/bs.out > /tmp/caller-token
          test -s /tmp/caller-token

      - name: bootstrap:cp-start
        id: cp-start
        # Background the CP. The trap on the surrounding step is implicit:
        # job teardown kills runner processes. We track the pid so the
        # collect step can scrape it.
        run: |
          set -euo pipefail
          export XDG_DATA_HOME=/tmp/uncluster-ci/data
          nohup uncluster server start --addr 127.0.0.1:17777 \
              > /tmp/cp.log 2>&1 &
          echo $! > /tmp/cp.pid
          # Wait for healthz.
          for _ in $(seq 1 30); do
              if curl -fsS http://127.0.0.1:17777/healthz >/dev/null 2>&1; then
                  echo "cp up"
                  exit 0
              fi
              sleep 1
          done
          echo "cp never became healthy"
          tail -50 /tmp/cp.log || true
          exit 1

      - name: rendezvous:mint-join-token
        id: mint-join
        run: |
          set -euo pipefail
          CALLER_TOK="$(cat /tmp/caller-token)"
          resp="$(curl -fsS -X POST http://127.0.0.1:17777/v1/tokens \
              -H "Authorization: Bearer ${CALLER_TOK}" \
              -H "Content-Type: application/json" \
              -d '{"kind":"join","label":"ci-join"}')"
          echo "${resp}" | jq -r '.token' > /tmp/join-token
          test -s /tmp/join-token

      - name: product:agent-join
        id: agent-join
        run: |
          set -euo pipefail
          sudo env UNCLUSTER_TOKEN="$(cat /tmp/join-token)" \
              uncluster agent join \
                  --server http://127.0.0.1:17777 \
                  --name ci-agent

      - name: product:agent-install
        id: agent-install
        run: |
          set -euo pipefail
          sudo uncluster agent install

      - name: bootstrap:mirror-config-for-service-user
        id: mirror-cfg
        # TEMPORARY workaround for issue #77 — `agent install` writes
        # agent.toml at the operator's $HOME-relative path
        # ($HOME/.config/uncluster/agent.toml). With `sudo -E` on GitHub
        # ubuntu-latest the operator-of-record is the runner user
        # (HOME=/home/runner), not root. But the systemd unit runs as
        # `uncluster` (HOME=/home/uncluster), where the config does not
        # exist. The service then flap-fails. Mirror the config to the
        # service account's $HOME until the upstream fix (system-wide
        # /etc/uncluster path or equivalent) lands. Marked `bootstrap:*`
        # so it can be removed without re-plumbing the taxonomy classifier.
        #
        # We pick up the source from whichever path `agent join` actually
        # used (sudo -E preserves the caller's HOME; sudo without -E uses
        # root's HOME). Either way the file is named the same — we just
        # search both.
        run: |
          set -euo pipefail
          src=""
          for candidate in \
              "${HOME}/.config/uncluster/agent.toml" \
              /root/.config/uncluster/agent.toml; do
              if sudo test -f "${candidate}"; then
                  src="${candidate}"
                  break
              fi
          done
          if [[ -z "${src}" ]]; then
              echo "agent.toml not found in any known location"
              sudo find / -name agent.toml -path '*uncluster*' 2>/dev/null || true
              exit 1
          fi
          echo "found agent.toml at ${src}"
          sudo mkdir -p /home/uncluster/.config/uncluster
          sudo cp "${src}" /home/uncluster/.config/uncluster/agent.toml
          sudo chown -R uncluster:uncluster /home/uncluster
          sudo chmod 0700 /home/uncluster/.config /home/uncluster/.config/uncluster
          sudo chmod 0600 /home/uncluster/.config/uncluster/agent.toml
          # Restart so the service can re-read its (now visible) config.
          sudo systemctl restart com.uncluster.agent
          sleep 2

      - name: product:assert-service-active
        id: assert-svc
        run: |
          set -euo pipefail
          # The unit name is `com.uncluster.agent` per gatekeeper/install_unix.go.
          sudo systemctl is-active --quiet com.uncluster.agent
          sudo systemctl status com.uncluster.agent --no-pager || true

      - name: product:assert-agent-online
        id: assert-online
        # Heartbeat fires immediately on startup; second one 10s later.
        # status=online when LastSeen < 30s. Allow up to 40s for the first
        # heartbeat to land (cold start of the service).
        run: |
          set -euo pipefail
          CALLER_TOK="$(cat /tmp/caller-token)"
          for _ in $(seq 1 40); do
              status="$(curl -fsS http://127.0.0.1:17777/v1/agents \
                  -H "Authorization: Bearer ${CALLER_TOK}" \
                  | jq -r '.[] | select(.name=="ci-agent") | .last_seen_at // empty')"
              if [[ -n "${status}" && "${status}" != "null" ]]; then
                  age=$(( $(date +%s) - ${status} ))
                  if [[ "${age}" -lt 30 ]]; then
                      echo "agent online (last seen ${age}s ago)"
                      exit 0
                  fi
              fi
              sleep 1
          done
          echo "agent never reported online"
          exit 1

      - name: product:assert-doctor
        id: assert-doctor
        run: |
          set -euo pipefail
          sudo uncluster agent doctor

      - name: product:assert-sshd-drop-in
        id: assert-drop-in
        run: |
          set -euo pipefail
          test -f /etc/ssh/sshd_config.d/uncluster.conf
          sudo grep -q 'TrustedUserCAKeys' /etc/ssh/sshd_config.d/uncluster.conf
          sudo grep -q 'AuthorizedPrincipalsFile' /etc/ssh/sshd_config.d/uncluster.conf

      - name: product:assert-principals-dir-perms
        id: assert-perms
        run: |
          set -euo pipefail
          # Owner root, group uncluster, mode 0775 per install_unix.go.
          stat -c '%U:%G %a' /etc/ssh/auth_principals
          owner="$(stat -c '%U' /etc/ssh/auth_principals)"
          group="$(stat -c '%G' /etc/ssh/auth_principals)"
          mode="$(stat -c '%a' /etc/ssh/auth_principals)"
          if [[ "${owner}" != "root" || "${group}" != "uncluster" || "${mode}" != "775" ]]; then
              echo "principals dir perms wrong: ${owner}:${group} ${mode}"
              ls -la /etc/ssh/auth_principals
              exit 1
          fi

      - name: product:deprovision-and-marker
        id: deprov
        run: |
          set -euo pipefail
          CALLER_TOK="$(cat /tmp/caller-token)"
          curl -fsS -X DELETE http://127.0.0.1:17777/v1/agents/ci-agent \
              -H "Authorization: Bearer ${CALLER_TOK}"
          # Marker lands next to whichever agent.toml the service process
          # actually loaded from. Under the #77 workaround the service
          # reads /home/uncluster/.config/uncluster/agent.toml, so the
          # marker lands at /home/uncluster/.config/uncluster/.deprovisioned.
          # Allow up to 15s for the agent to heartbeat, see 410, wipe,
          # write the marker, and exit.
          marker="/home/uncluster/.config/uncluster/.deprovisioned"
          for _ in $(seq 1 15); do
              if sudo test -f "${marker}"; then
                  echo "marker present at ${marker}"
                  break
              fi
              sleep 1
          done
          if ! sudo test -f "${marker}"; then
              echo "marker not found at ${marker}; searching"
              sudo find / -name ".deprovisioned" 2>/dev/null || true
              exit 1
          fi
          # Principals dir should be empty (all per-user files wiped).
          remaining="$(sudo find /etc/ssh/auth_principals -mindepth 1 -maxdepth 1 -type f | wc -l)"
          if [[ "${remaining}" -ne 0 ]]; then
              echo "expected empty principals after deprovision; found ${remaining} files"
              sudo ls -la /etc/ssh/auth_principals
              exit 1
          fi

      - name: collect:artifacts
        if: always()
        run: |
          set +e
          mkdir -p t2-linux-artifacts
          sudo journalctl -u com.uncluster.agent --no-pager > t2-linux-artifacts/agent-journal.txt 2>&1
          sudo journalctl -u ssh --no-pager --since "10 minutes ago" > t2-linux-artifacts/ssh-journal.txt 2>&1
          cp /tmp/cp.log t2-linux-artifacts/cp.log 2>/dev/null || true
          sudo cat /etc/ssh/sshd_config.d/uncluster.conf > t2-linux-artifacts/sshd-drop-in.conf 2>&1
          sudo cat /etc/ssh/uncluster_ca.pub > t2-linux-artifacts/ca.pub 2>&1
          sudo ls -la /etc/ssh/auth_principals > t2-linux-artifacts/principals-listing.txt 2>&1
          sudo sshd -T > t2-linux-artifacts/sshd-T.txt 2>&1
          sudo systemctl status com.uncluster.agent --no-pager > t2-linux-artifacts/svc-status.txt 2>&1
          # Scrape agent.toml from every known location since the install
          # path can land it under sudo-with-E ($HOME/.config), pristine sudo
          # (/root/.config), or the post-mirror service path
          # (/home/uncluster/.config).
          for d in "${HOME}/.config/uncluster" "/root/.config/uncluster" "/home/uncluster/.config/uncluster"; do
              if sudo test -d "${d}"; then
                  safe="$(echo "${d}" | tr '/' '_')"
                  sudo ls -la "${d}" > "t2-linux-artifacts/cfg${safe}.txt" 2>&1 || true
                  sudo cat "${d}/agent.toml" > "t2-linux-artifacts/agent-toml${safe}.txt" 2>&1 || true
              fi
          done
          ls -la t2-linux-artifacts
        continue-on-error: true

      - name: collect:classify-and-upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: t2-linux-${{ github.run_id }}
          path: t2-linux-artifacts/
          if-no-files-found: warn
          retention-days: 14

      - name: enforce-taxonomy
        if: always()
        run: |
          ./scripts/ci/classify-step.sh \
              "bootstrap:build-binary=${{ steps.build.outcome }}" \
              "bootstrap:install-sshd=${{ steps.sshd.outcome }}" \
              "bootstrap:cp-bootstrap=${{ steps.cp-bs.outcome }}" \
              "bootstrap:cp-start=${{ steps.cp-start.outcome }}" \
              "rendezvous:mint-join-token=${{ steps.mint-join.outcome }}" \
              "product:agent-join=${{ steps.agent-join.outcome }}" \
              "product:agent-install=${{ steps.agent-install.outcome }}" \
              "bootstrap:mirror-config-for-service-user=${{ steps.mirror-cfg.outcome }}" \
              "product:assert-service-active=${{ steps.assert-svc.outcome }}" \
              "product:assert-agent-online=${{ steps.assert-online.outcome }}" \
              "product:assert-doctor=${{ steps.assert-doctor.outcome }}" \
              "product:assert-sshd-drop-in=${{ steps.assert-drop-in.outcome }}" \
              "product:assert-principals-dir-perms=${{ steps.assert-perms.outcome }}" \
              "product:deprovision-and-marker=${{ steps.deprov.outcome }}" \
              > /tmp/classify.out
          cat /tmp/classify.out
          class="$(grep -E '^class=' /tmp/classify.out | cut -d= -f2)"
          case "${class}" in
              success)  exit 0 ;;
              advisory) echo "::warning::T2-linux advisory failure (bootstrap/rendezvous); see artifacts"; exit 0 ;;
              required) echo "::error::T2-linux REQUIRED failure (product). Block merge."; exit 1 ;;
              *)        echo "::error::T2-linux unknown class=${class}"; exit 1 ;;
          esac

  # T2-windows loopback install smoke per ADR-0008.
  # Exercises the REAL `uncluster agent install` flow on a clean
  # windows-latest runner: SCM service install, virtual-account ACLs,
  # OpenSSH for Windows drop-in, heartbeat + doctor + deprovision.
  #
  # This is the per-PR catch for Windows SCM + icacls regressions
  # (the equivalent of #50 on Windows). All steps are PowerShell-based.
  #
  # Like T2-linux, this hits the same agent.toml-path bug tracked in
  # #77 — the service runs as `NT SERVICE\UnclusterAgent` whose
  # USERPROFILE is `C:\Windows\System32\config\systemprofile`, but
  # `agent join` writes to the operator's USERPROFILE. The mirror step
  # is the same temporary workaround pattern as T2-linux and goes away
  # with the same upstream fix.
  t2-windows-install-smoke:
    runs-on: windows-latest
    timeout-minutes: 15
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: bootstrap:build-binary
        id: build
        run: |
          go build -trimpath -ldflags "-s -w" -o C:\uncluster\uncluster.exe .\cmd\uncluster
          # Add to PATH so `uncluster` resolves directly.
          Add-Content -Path $env:GITHUB_PATH -Value "C:\uncluster"
          # Smoke-check.
          & C:\uncluster\uncluster.exe --help | Out-Null

      - name: bootstrap:install-sshd
        id: sshd
        # OpenSSH.Server is preinstalled on windows-latest runners as of
        # 2024; keep the install step idempotent in case the image changes.
        run: |
          $cap = Get-WindowsCapability -Online -Name 'OpenSSH.Server*'
          if ($cap.State -ne 'Installed') {
              Add-WindowsCapability -Online -Name 'OpenSSH.Server~~~~0.0.1.0'
          }
          Set-Service -Name sshd -StartupType Automatic
          Start-Service sshd
          # Wait briefly for sshd to become ready.
          $deadline = (Get-Date).AddSeconds(20)
          while ((Get-Date) -lt $deadline) {
              if ((Get-Service sshd).Status -eq 'Running') { break }
              Start-Sleep -Seconds 1
          }
          if ((Get-Service sshd).Status -ne 'Running') {
              throw "sshd never started"
          }

      - name: bootstrap:cp-bootstrap
        id: cp-bs
        run: |
          $env:XDG_DATA_HOME = "C:\uncluster-data"
          New-Item -ItemType Directory -Force -Path $env:XDG_DATA_HOME | Out-Null
          $out = & C:\uncluster\uncluster.exe server bootstrap --label ci-bootstrap 2>&1
          $out | Set-Content C:\bs.out
          Write-Host $out
          # Parse the caller token. Format: "caller token (shown ONCE...):\n  <token>"
          $lines = Get-Content C:\bs.out
          $idx = -1
          for ($i = 0; $i -lt $lines.Length; $i++) {
              if ($lines[$i] -match 'caller token \(shown ONCE') { $idx = $i + 1; break }
          }
          if ($idx -lt 0) { throw "caller token line not found in bootstrap output" }
          $tok = $lines[$idx].Trim()
          if (-not $tok) { throw "caller token was empty" }
          Set-Content -Path C:\caller-token -Value $tok -NoNewline -Encoding ASCII

      - name: bootstrap:cp-start
        id: cp-start
        run: |
          $env:XDG_DATA_HOME = "C:\uncluster-data"
          # Launch CP in background; PowerShell `Start-Process` returns immediately.
          $proc = Start-Process -FilePath C:\uncluster\uncluster.exe `
              -ArgumentList 'server','start','--addr','127.0.0.1:17777' `
              -RedirectStandardOutput C:\cp.log `
              -RedirectStandardError C:\cp.err `
              -PassThru -WindowStyle Hidden
          $proc.Id | Out-File C:\cp.pid
          # Wait for healthz.
          $deadline = (Get-Date).AddSeconds(30)
          $healthy = $false
          while ((Get-Date) -lt $deadline) {
              try {
                  $r = Invoke-WebRequest -UseBasicParsing -Uri http://127.0.0.1:17777/healthz -TimeoutSec 2
                  if ($r.StatusCode -eq 200) { $healthy = $true; break }
              } catch { }
              Start-Sleep -Seconds 1
          }
          if (-not $healthy) {
              Get-Content C:\cp.log -ErrorAction SilentlyContinue
              Get-Content C:\cp.err -ErrorAction SilentlyContinue
              throw "cp never became healthy"
          }

      - name: rendezvous:mint-join-token
        id: mint-join
        run: |
          $tok = Get-Content C:\caller-token -Raw
          $headers = @{ 'Authorization' = "Bearer $tok"; 'Content-Type' = 'application/json' }
          $body = '{"kind":"join","label":"ci-join"}'
          $r = Invoke-RestMethod -Method Post -Uri http://127.0.0.1:17777/v1/tokens -Headers $headers -Body $body
          $r.token | Set-Content C:\join-token -NoNewline -Encoding ASCII
          if (-not (Get-Content C:\join-token -Raw)) { throw "join token empty" }

      - name: product:agent-join
        id: agent-join
        run: |
          $env:UNCLUSTER_TOKEN = Get-Content C:\join-token -Raw
          & C:\uncluster\uncluster.exe agent join `
              --server http://127.0.0.1:17777 `
              --name ci-agent

      - name: product:agent-install
        id: agent-install
        # windows-latest runners are Administrator by default per GH docs.
        run: |
          & C:\uncluster\uncluster.exe agent install

      - name: bootstrap:mirror-config-for-service-user
        id: mirror-cfg
        # Same #77 workaround as T2-linux but for Windows. `agent join`
        # writes agent.toml under the operator's USERPROFILE
        # (`$env:USERPROFILE\.config\uncluster\agent.toml`, typically
        # `C:\Users\runneradmin\...`). The SCM service runs as
        # `NT SERVICE\UnclusterAgent` whose profile is at
        # `C:\Windows\System32\config\systemprofile\.config\uncluster\`.
        # Mirror so the service can read its config. Marked `bootstrap:*`
        # so the classifier treats its own failure as advisory if the
        # upstream fix changes the assumption.
        run: |
          $src = Join-Path $env:USERPROFILE '.config\uncluster\agent.toml'
          if (-not (Test-Path $src)) {
              Write-Host "agent.toml not found at $src; searching..."
              Get-ChildItem -Path C:\ -Filter 'agent.toml' -Recurse -ErrorAction SilentlyContinue |
                  Select-Object FullName | Format-Table -AutoSize
              throw "agent.toml missing"
          }
          $dst_dir = 'C:\Windows\System32\config\systemprofile\.config\uncluster'
          New-Item -ItemType Directory -Force -Path $dst_dir | Out-Null
          Copy-Item -Force $src (Join-Path $dst_dir 'agent.toml')
          # Grant the virtual service account read access to its own profile dir.
          # The default SYSTEM-only ACL on systemprofile should already include
          # NT SERVICE\* virtual accounts, but be explicit.
          icacls $dst_dir /grant 'NT SERVICE\UnclusterAgent:(OI)(CI)R' | Out-Null
          # Restart so the service re-reads its (now visible) config.
          Restart-Service UnclusterAgent
          Start-Sleep -Seconds 3

      - name: product:assert-service-running
        id: assert-svc
        run: |
          $svc = Get-Service UnclusterAgent
          if ($svc.Status -ne 'Running') {
              throw "UnclusterAgent not running: $($svc.Status)"
          }
          if ($svc.StartType -ne 'Automatic') {
              throw "UnclusterAgent StartType=$($svc.StartType), want Automatic"
          }
          Get-Service UnclusterAgent | Format-Table -AutoSize

      - name: product:assert-agent-online
        id: assert-online
        run: |
          $tok = Get-Content C:\caller-token -Raw
          $headers = @{ 'Authorization' = "Bearer $tok" }
          $deadline = (Get-Date).AddSeconds(40)
          while ((Get-Date) -lt $deadline) {
              try {
                  $agents = Invoke-RestMethod -Uri http://127.0.0.1:17777/v1/agents -Headers $headers
                  $ci = $agents | Where-Object { $_.name -eq 'ci-agent' } | Select-Object -First 1
                  if ($ci -and $ci.last_seen_at) {
                      $age = [int]((Get-Date -UFormat %s) - $ci.last_seen_at)
                      if ($age -lt 30) {
                          Write-Host "agent online (last seen $age s ago)"
                          exit 0
                      }
                  }
              } catch { }
              Start-Sleep -Seconds 1
          }
          throw "agent never reported online"

      - name: product:assert-doctor
        id: assert-doctor
        run: |
          & C:\uncluster\uncluster.exe agent doctor
          if ($LASTEXITCODE -ne 0) { throw "doctor exit=$LASTEXITCODE" }

      - name: product:assert-sshd-drop-in
        id: assert-drop-in
        run: |
          $p = 'C:\ProgramData\ssh\sshd_config.d\uncluster.conf'
          if (-not (Test-Path $p)) { throw "drop-in not found at $p" }
          $content = Get-Content $p -Raw
          if ($content -notmatch 'TrustedUserCAKeys') { throw "missing TrustedUserCAKeys" }
          if ($content -notmatch 'AuthorizedPrincipalsFile') { throw "missing AuthorizedPrincipalsFile" }

      - name: product:assert-principals-acl
        id: assert-acl
        run: |
          $dir = 'C:\ProgramData\ssh\auth_principals'
          if (-not (Test-Path $dir)) { throw "principals dir not found at $dir" }
          $acl = icacls $dir 2>&1 | Out-String
          Write-Host $acl
          # Expect an entry granting UnclusterAgent virtual account write.
          if ($acl -notmatch 'UnclusterAgent') {
              throw "principals dir ACL missing UnclusterAgent virtual account"
          }

      - name: product:deprovision-and-marker
        id: deprov
        run: |
          $tok = Get-Content C:\caller-token -Raw
          $headers = @{ 'Authorization' = "Bearer $tok" }
          Invoke-RestMethod -Method Delete -Uri http://127.0.0.1:17777/v1/agents/ci-agent -Headers $headers | Out-Null
          # Marker lands next to the agent.toml the service loaded from —
          # under the #77 workaround that is the systemprofile path.
          $marker = 'C:\Windows\System32\config\systemprofile\.config\uncluster\.deprovisioned'
          $deadline = (Get-Date).AddSeconds(15)
          $found = $false
          while ((Get-Date) -lt $deadline) {
              if (Test-Path $marker) { $found = $true; break }
              Start-Sleep -Seconds 1
          }
          if (-not $found) {
              Write-Host "marker not found at $marker; searching"
              Get-ChildItem -Path C:\ -Filter '.deprovisioned' -Recurse -ErrorAction SilentlyContinue |
                  Select-Object FullName | Format-Table -AutoSize
              throw "marker missing"
          }
          # Principals dir should be empty.
          $remaining = (Get-ChildItem -File -Path 'C:\ProgramData\ssh\auth_principals' -ErrorAction SilentlyContinue | Measure-Object).Count
          if ($remaining -ne 0) {
              Write-Host "principals not empty: $remaining files remain"
              Get-ChildItem -Path 'C:\ProgramData\ssh\auth_principals' | Format-Table -AutoSize
              throw "principals not wiped"
          }

      - name: collect:artifacts
        if: always()
        # Best-effort scrape. Robust against missing files (any step may
        # have failed before its data landed).
        run: |
          New-Item -ItemType Directory -Force -Path t2-windows-artifacts | Out-Null
          $ErrorActionPreference = 'Continue'
          # Event Viewer logs filtered to our service + sshd.
          try {
              Get-WinEvent -LogName 'Application' -MaxEvents 200 -ErrorAction SilentlyContinue |
                  Where-Object { $_.ProviderName -match 'Uncluster|UnclusterAgent|sshd|OpenSSH' } |
                  Format-List | Out-File t2-windows-artifacts\events-application.txt
          } catch { }
          try {
              Get-WinEvent -LogName 'System' -MaxEvents 200 -ErrorAction SilentlyContinue |
                  Where-Object { $_.ProviderName -match 'Service Control Manager' } |
                  Format-List | Out-File t2-windows-artifacts\events-system.txt
          } catch { }
          Get-Content C:\cp.log -ErrorAction SilentlyContinue | Out-File t2-windows-artifacts\cp.log
          Get-Content C:\cp.err -ErrorAction SilentlyContinue | Out-File t2-windows-artifacts\cp.err
          Get-Content 'C:\ProgramData\ssh\sshd_config.d\uncluster.conf' -ErrorAction SilentlyContinue | Out-File t2-windows-artifacts\sshd-drop-in.conf
          Get-Content 'C:\ProgramData\ssh\uncluster_ca.pub' -ErrorAction SilentlyContinue | Out-File t2-windows-artifacts\ca.pub
          icacls 'C:\ProgramData\ssh\auth_principals' 2>&1 | Out-File t2-windows-artifacts\principals-acl.txt
          Get-ChildItem -Force 'C:\ProgramData\ssh\auth_principals' -ErrorAction SilentlyContinue |
              Format-Table -AutoSize | Out-File t2-windows-artifacts\principals-listing.txt
          sc.exe qc UnclusterAgent | Out-File t2-windows-artifacts\sc-qc.txt
          Get-Service UnclusterAgent | Format-List | Out-File t2-windows-artifacts\service-detail.txt
          Get-ChildItem -Force -Recurse -Path 'C:\Users\runneradmin\.config\uncluster' -ErrorAction SilentlyContinue |
              Format-Table | Out-File t2-windows-artifacts\cfg-runneradmin.txt
          Get-Content 'C:\Users\runneradmin\.config\uncluster\agent.toml' -ErrorAction SilentlyContinue |
              Out-File t2-windows-artifacts\agent-toml-runneradmin.txt
          Get-ChildItem -Force -Recurse -Path 'C:\Windows\System32\config\systemprofile\.config\uncluster' -ErrorAction SilentlyContinue |
              Format-Table | Out-File t2-windows-artifacts\cfg-systemprofile.txt
          Get-Content 'C:\Windows\System32\config\systemprofile\.config\uncluster\agent.toml' -ErrorAction SilentlyContinue |
              Out-File t2-windows-artifacts\agent-toml-systemprofile.txt
          Get-ChildItem t2-windows-artifacts | Format-Table -AutoSize

      - name: collect:upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: t2-windows-${{ github.run_id }}
          path: t2-windows-artifacts/
          if-no-files-found: warn
          retention-days: 14

      - name: enforce-taxonomy
        if: always()
        shell: bash
        # Use bash for the classifier script (it's bash). The runner has
        # bash via git bash.
        run: |
          ./scripts/ci/classify-step.sh \
              "bootstrap:build-binary=${{ steps.build.outcome }}" \
              "bootstrap:install-sshd=${{ steps.sshd.outcome }}" \
              "bootstrap:cp-bootstrap=${{ steps.cp-bs.outcome }}" \
              "bootstrap:cp-start=${{ steps.cp-start.outcome }}" \
              "rendezvous:mint-join-token=${{ steps.mint-join.outcome }}" \
              "product:agent-join=${{ steps.agent-join.outcome }}" \
              "product:agent-install=${{ steps.agent-install.outcome }}" \
              "bootstrap:mirror-config-for-service-user=${{ steps.mirror-cfg.outcome }}" \
              "product:assert-service-running=${{ steps.assert-svc.outcome }}" \
              "product:assert-agent-online=${{ steps.assert-online.outcome }}" \
              "product:assert-doctor=${{ steps.assert-doctor.outcome }}" \
              "product:assert-sshd-drop-in=${{ steps.assert-drop-in.outcome }}" \
              "product:assert-principals-acl=${{ steps.assert-acl.outcome }}" \
              "product:deprovision-and-marker=${{ steps.deprov.outcome }}" \
              > /tmp/classify.out
          cat /tmp/classify.out
          class="$(grep -E '^class=' /tmp/classify.out | cut -d= -f2)"
          case "${class}" in
              success)  exit 0 ;;
              advisory) echo "::warning::T2-windows advisory failure"; exit 0 ;;
              required) echo "::error::T2-windows REQUIRED failure. Block merge."; exit 1 ;;
              *)        echo "::error::T2-windows unknown class=${class}"; exit 1 ;;
          esac

  # Aggregator job: creates a single "all-tests-pass" check that can be marked
  # as required in branch protection. This ensures ALL matrix OS variants AND
  # the E2E Compose smoke AND the per-OS install smokes must pass before a PR
  # can merge.
  all-tests-pass:
    runs-on: ubuntu-latest
    needs: [test, e2e-compose-smoke, t2-linux-install-smoke, t2-windows-install-smoke]
    if: always()
    steps:
      - name: fail if any required job failed
        run: |
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "test matrix result: ${{ needs.test.result }}"
            exit 1
          fi
          if [[ "${{ needs.e2e-compose-smoke.result }}" != "success" ]]; then
            echo "e2e-compose-smoke result: ${{ needs.e2e-compose-smoke.result }}"
            exit 1
          fi
          if [[ "${{ needs.t2-linux-install-smoke.result }}" != "success" ]]; then
            echo "t2-linux-install-smoke result: ${{ needs.t2-linux-install-smoke.result }}"
            exit 1
          fi
          if [[ "${{ needs.t2-windows-install-smoke.result }}" != "success" ]]; then
            echo "t2-windows-install-smoke result: ${{ needs.t2-windows-install-smoke.result }}"
            exit 1
          fi

  build:
    runs-on: ubuntu-latest
    needs: all-tests-pass
    strategy:
      matrix:
        include:
          - { goos: darwin,  goarch: amd64, ext: ""     }
          - { goos: darwin,  goarch: arm64, ext: ""     }
          - { goos: linux,   goarch: amd64, ext: ""     }
          - { goos: linux,   goarch: arm64, ext: ""     }
          - { goos: windows, goarch: amd64, ext: ".exe" }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -trimpath -ldflags "-s -w" -o uncluster-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} ./cmd/uncluster
      - uses: actions/upload-artifact@v4
        with:
          name: uncluster-${{ matrix.goos }}-${{ matrix.goarch }}
          path: uncluster-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

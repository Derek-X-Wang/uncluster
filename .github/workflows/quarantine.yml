# Quarantine rule per ADR-0008.
#
# Scans recent main-branch runs of advisory-capable workflows; opens a
# `needs-triage` issue when 3 consecutive runs are advisory failures.
# Runs hourly so the lag between "rendezvous breaking" and "operator
# notified" is short.

name: quarantine-watchdog

on:
  schedule:
    - cron: "17 * * * *"  # hourly, offset to avoid the top-of-hour rush
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  actions: read

jobs:
  watch-e2e-compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: run quarantine rule for ci (T1 compose smoke)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The T1 smoke now lives inside ci.yml's e2e-compose-smoke job. The
          # quarantine rule reads run history at workflow granularity, so the
          # workflow argument is the file name. A run's overall conclusion is
          # what we classify; a failure rolls up from the e2e-compose-smoke job.
          ./scripts/ci/quarantine-rule.sh --workflow ci.yml --threshold 3

  watch-e2e-cross-machine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: run quarantine rule for e2e-cross-machine (T3a)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./scripts/ci/quarantine-rule.sh --workflow e2e-cross-machine.yml --threshold 3

  watch-self-update-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: run quarantine rule for self-update-e2e (#169)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Nightly/dispatch self-update mechanism E2E. A required-class failure
          # here is a real self-update product regression; 3 consecutive escalate.
          ./scripts/ci/quarantine-rule.sh --workflow self-update-e2e.yml --threshold 3
